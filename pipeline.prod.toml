# Gaia Pipeline — Production environment
# Usage: python scripts/pipeline/run_full_pipeline.py --env prod

[pipeline]
output_dir = "output"
concurrency = 10

[pipeline.canonicalization]
use_embedding = true

[storage]
graph_backend = "neo4j"

[storage.env_mapping]
PROD_GAIA_LANCEDB_URI = "GAIA_LANCEDB_URI"
PROD_NEO4J_URI = "GAIA_NEO4J_URI"
PROD_NEO4J_USER = "GAIA_NEO4J_USER"
PROD_NEO4J_PASSWORD = "GAIA_NEO4J_PASSWORD"
PROD_NEO4J_DB = "GAIA_NEO4J_DATABASE"
