  - generic [ref=e36]:
    - generic [ref=e37]:
      - heading "motivation" [level=2] [ref=e38]
      - 'heading "Module: motivation" [level=1] [ref=e39]'
      - heading "kitaev_hamiltonian" [level=3] [ref=e40]
      - paragraph [ref=e41]:
        - strong [ref=e42]: "QID:"
        - code [ref=e43]: paper:kitaev_rydberg::kitaev_hamiltonian
        - strong [ref=e44]: "Type:"
        - text: setting
        - strong [ref=e45]: "Role:"
        - text: setting
        - strong [ref=e46]: "Content:"
        - text: "The Kitaev honeycomb model is defined by Hamiltonian $H = -\\sum_{\\langle ij \\rangle_\\gamma} J_\\gamma s_i^\\gamma s_j^\\gamma - \\sum_{j,\\gamma} h_\\gamma s_j^\\gamma$, where $\\langle ij \\rangle_\\gamma$ labels $\\gamma$-type bonds ($\\gamma = x, y, z$), $J_\\gamma$ denotes Ising coupling for spin components $s_{i(j)}^\\gamma$, and $h_\\gamma$ represents Zeeman field components."
      - heading "hardcore_boson_rep" [level=3] [ref=e47]
      - paragraph [ref=e48]:
        - strong [ref=e49]: "QID:"
        - code [ref=e50]: paper:kitaev_rydberg::hardcore_boson_rep
        - strong [ref=e51]: "Type:"
        - text: setting
        - strong [ref=e52]: "Role:"
        - text: setting
        - strong [ref=e53]: "Content:"
        - text: "Hard-core bosons are defined as $b_j = s_j^-$ with $b_j^2 = 0$. In this representation, the Ising interactions along $\\gamma$-bonds decompose into hopping $J_{+-}^\\gamma$ and pairing $J_{--}^\\gamma$ terms: $\\sum_{\\langle ij \\rangle_\\gamma} J_\\gamma s_i^\\gamma s_j^\\gamma = \\sum_{\\langle ij \\rangle_\\gamma} (J_{+-}^\\gamma b_i^\\dagger b_j + J_{--}^\\gamma b_i b_j) + \\mathrm{H.c.}$"
      - heading "sign_config" [level=3] [ref=e54]
      - paragraph [ref=e55]:
        - strong [ref=e56]: "QID:"
        - code [ref=e57]: paper:kitaev_rydberg::sign_config
        - strong [ref=e58]: "Type:"
        - text: setting
        - strong [ref=e59]: "Role:"
        - text: setting
        - strong [ref=e60]: "Content:"
        - text: "Along x-bonds: $J_{+-}^x = J_{--}^x = J_x/4$. Along y-bonds: $J_{+-}^y = -J_{--}^y = J_y/4$. This alternating sign configuration is essential for realizing Kitaev exchange interactions."
      - heading "kitaev_phases" [level=3] [ref=e61]
      - paragraph [ref=e62]:
        - strong [ref=e63]: "QID:"
        - code [ref=e64]: paper:kitaev_rydberg::kitaev_phases
        - strong [ref=e65]: "Type:"
        - text: setting
        - strong [ref=e66]: "Role:"
        - text: setting
        - strong [ref=e67]: "Content:"
        - text: At $h_\gamma = 0$, the exactly solvable Kitaev model has three gapped Abelian A phases and one gapless B phase, characterized by Majorana fermions in a $Z_2$ gauge field. Applying Zeeman field breaks time-reversal symmetry and drives the B phase into a non-Abelian spin liquid with Ising-type topological order.
      - heading "rydberg_platform" [level=3] [ref=e68]
      - paragraph [ref=e69]:
        - strong [ref=e70]: "QID:"
        - code [ref=e71]: paper:kitaev_rydberg::rydberg_platform
        - strong [ref=e72]: "Type:"
        - text: setting
        - strong [ref=e73]: "Role:"
        - text: setting
        - strong [ref=e74]: "Content:"
        - text: "Rydberg atoms in optical tweezer arrays can simulate quantum spin models, with atoms representing lattice spins and dipole-dipole / van der Waals (vdW) interactions inherently producing XY and Ising interactions. The $^{87}$Rb atoms can be prepared in Rydberg states $|n_D D_{5/2}\\rangle$ and $|n_P P_{3/2}\\rangle$."
      - heading "research_question" [level=3] [ref=e75]
      - paragraph [ref=e76]:
        - strong [ref=e77]: "QID:"
        - code [ref=e78]: paper:kitaev_rydberg::research_question
        - strong [ref=e79]: "Type:"
        - text: question
        - strong [ref=e80]: "Role:"
        - text: question
        - strong [ref=e81]: "Content:"
        - text: Can the Kitaev chiral spin liquid with non-Abelian anyonic excitations be realized and detected in a Rydberg atom array?
      - heading "topological_order_beyond_landau" [level=3] [ref=e82]
      - paragraph [ref=e83]:
        - strong [ref=e84]: "QID:"
        - code [ref=e85]: paper:kitaev_rydberg::topological_order_beyond_landau
        - strong [ref=e86]: "Type:"
        - text: claim
        - strong [ref=e87]: "Role:"
        - text: orphaned
        - strong [ref=e88]: "Content:"
        - text: Topological order is a concept in condensed matter physics that goes beyond the Landau paradigm and can host exotic quasiparticle excitations known as anyons.
        - strong [ref=e89]: "Prior:"
        - text: "0.95"
        - strong [ref=e90]: "Belief:"
        - text: "0.95"
      - heading "kitaev_non_abelian" [level=3] [ref=e91]
      - paragraph [ref=e92]:
        - strong [ref=e93]: "QID:"
        - code [ref=e94]: paper:kitaev_rydberg::kitaev_non_abelian
        - strong [ref=e95]: "Type:"
        - text: claim
        - strong [ref=e96]: "Role:"
        - text: orphaned
        - strong [ref=e97]: "Content:"
        - text: The Kitaev model on the honeycomb lattice with an exactly solvable ground state is an ideal platform to prepare gapped quantum spin liquid (QSL) phases with Ising-type non-Abelian topological order.
        - strong [ref=e98]: "Prior:"
        - text: "0.90"
        - strong [ref=e99]: "Belief:"
        - text: "0.90"
      - heading "braiding_robust" [level=3] [ref=e100]
      - paragraph [ref=e101]:
        - strong [ref=e102]: "QID:"
        - code [ref=e103]: paper:kitaev_rydberg::braiding_robust
        - strong [ref=e104]: "Type:"
        - text: claim
        - strong [ref=e105]: "Role:"
        - text: orphaned
        - strong [ref=e106]: "Content:"
        - text: The braiding of Ising-type anyonic excitations results in non-Abelian Berry phase within the space of topologically degenerate states, which remains robust against local perturbations.
        - strong [ref=e107]: "Prior:"
        - text: "0.85"
        - strong [ref=e108]: "Belief:"
        - text: "0.85"
      - heading "topological_qc" [level=3] [ref=e109]
      - paragraph [ref=e110]:
        - strong [ref=e111]: "QID:"
        - code [ref=e112]: paper:kitaev_rydberg::topological_qc
        - strong [ref=e113]: "Type:"
        - text: claim
        - strong [ref=e114]: "Role:"
        - text: orphaned
        - strong [ref=e115]: "Content:"
        - text: The promotion of braiding operations to unitary gates is the key to fault-tolerant topological quantum computation.
        - strong [ref=e116]: "Prior:"
        - text: "0.85"
        - strong [ref=e117]: "Belief:"
        - text: "0.85"
      - heading "solidstate_challenges" [level=3] [ref=e118]
      - paragraph [ref=e119]:
        - strong [ref=e120]: "QID:"
        - code [ref=e121]: paper:kitaev_rydberg::solidstate_challenges
        - strong [ref=e122]: "Type:"
        - text: claim
        - strong [ref=e123]: "Role:"
        - text: orphaned
        - strong [ref=e124]: "Content:"
        - text: Significant efforts in solid-state systems to realize Kitaev QSL phases have not yet achieved conclusive confirmation of the non-Abelian phase.
        - strong [ref=e125]: "Prior:"
        - text: "0.80"
        - strong [ref=e126]: "Belief:"
        - text: "0.80"
      - heading "quantum_simulation_promise" [level=3] [ref=e127]
      - paragraph [ref=e128]:
        - strong [ref=e129]: "QID:"
        - code [ref=e130]: paper:kitaev_rydberg::quantum_simulation_promise
        - strong [ref=e131]: "Type:"
        - text: claim
        - strong [ref=e132]: "Role:"
        - text: orphaned
        - strong [ref=e133]: "Content:"
        - text: Quantum simulation may provide a route to achieve a clean and highly controllable realization of the Kitaev spin liquid.
        - strong [ref=e134]: "Prior:"
        - text: "0.85"
        - strong [ref=e135]: "Belief:"
        - text: "0.85"
      - heading "direct_simulation_difficulty" [level=3] [ref=e136]
      - paragraph [ref=e137]:
        - strong [ref=e138]: "QID:"
        - code [ref=e139]: paper:kitaev_rydberg::direct_simulation_difficulty
        - strong [ref=e140]: "Type:"
        - text: claim
        - strong [ref=e141]: "Role:"
        - text: orphaned
        - strong [ref=e142]: "Content:"
        - text: Directly simulating bond-dependent Ising interactions with Rydberg atom arrays is challenging because the intrinsic dipole-dipole and vdW interactions between Rydberg atoms are of the XXZ type, not Ising type.
        - strong [ref=e143]: "Prior:"
        - text: "0.90"
        - strong [ref=e144]: "Belief:"
        - text: "0.90"
    - generic [ref=e145]:
      - heading "experimental_scheme" [level=2] [ref=e146]
      - 'heading "Module: experimental_scheme" [level=1] [ref=e147]'
      - heading "lattice_geometry" [level=3] [ref=e148]
      - paragraph [ref=e149]:
        - strong [ref=e150]: "QID:"
        - code [ref=e151]: paper:kitaev_rydberg::lattice_geometry
        - strong [ref=e152]: "Type:"
        - text: setting
        - strong [ref=e153]: "Role:"
        - text: setting
        - strong [ref=e154]: "Content:"
        - text: The Rydberg atom array has a deformed honeycomb lattice configuration with bond angles of $110^\circ$ (slightly deviated from ideal $120^\circ$). The x, y bond lengths are $a$ and z bond length is $b$. A real in-plane magnetic field defines the quantization axis perpendicular to z bonds and at angle $\theta = 20^\circ$ to x, y bonds.
      - heading "spin_states" [level=3] [ref=e155]
      - paragraph [ref=e156]:
        - strong [ref=e157]: "QID:"
        - code [ref=e158]: paper:kitaev_rydberg::spin_states
        - strong [ref=e159]: "Type:"
        - text: setting
        - strong [ref=e160]: "Role:"
        - text: setting
        - strong [ref=e161]: "Content:"
        - text: "Spin states are represented by Rydberg states: $|\\downarrow\\rangle = |n_D D_{3/2}, m_J = 3/2\\rangle$ and $|\\uparrow\\rangle = |n_P P_{3/2}, m_J = 3/2\\rangle$. The intermediate state $|F\\rangle = |n_F F_{7/2}, m_J = 7/2\\rangle$ is used for pairing processes."
      - heading "energy_shifts" [level=3] [ref=e162]
      - paragraph [ref=e163]:
        - strong [ref=e164]: "QID:"
        - code [ref=e165]: paper:kitaev_rydberg::energy_shifts
        - strong [ref=e166]: "Type:"
        - text: setting
        - strong [ref=e167]: "Role:"
        - text: setting
        - strong [ref=e168]: "Content:"
        - text: "Site-dependent energy shifts $\\Delta_i$ and $\\Delta_i'$ at even and odd rows have a periodicity of every eight sites, achievable through local tuning of optical tweezers. Different Raman potentials $U_{e,p}$ can be applied to different bonds by matching the Raman potential frequency with corresponding detuning $\\Delta_{e,p}$."
      - heading "hopping_realization" [level=3] [ref=e169]
      - paragraph [ref=e170]:
        - strong [ref=e171]: "QID:"
        - code [ref=e172]: paper:kitaev_rydberg::hopping_realization
        - strong [ref=e173]: "Type:"
        - text: claim
        - strong [ref=e174]: "Role:"
        - text: independent
        - strong [ref=e175]: "Content:"
        - text: "The hopping term $J_{+-}$, which transforms $|\\downarrow\\rangle_i|\\uparrow\\rangle_j$ into $|\\uparrow\\rangle_i|\\downarrow\\rangle_j$, can be realized through laser-assisted dipole-dipole interaction. The bare dipole-dipole interaction $J_{d1}$ is suppressed by detuning $\\Delta_e$, and Raman potential $U_e$ compensates this energy offset, giving $J_{+-} = U_e J_{d1}/\\Delta_e + O((J_{d1}, U_e)^4)$."
        - strong [ref=e176]: "Prior:"
        - text: "0.85"
        - strong [ref=e177]: "Belief:"
        - text: "0.79"
        - strong [ref=e178]: "Referenced by:"
        - text: noisy_and ->
        - code [ref=e179]: paper:kitaev_rydberg::kitaev_realization
        - text: ; deduction ->
        - code [ref=e180]: paper:kitaev_rydberg::laddi_novelty
      - heading "pairing_realization" [level=3] [ref=e181]
      - paragraph [ref=e182]:
        - strong [ref=e183]: "QID:"
        - code [ref=e184]: paper:kitaev_rydberg::pairing_realization
        - strong [ref=e185]: "Type:"
        - text: claim
        - strong [ref=e186]: "Role:"
        - text: independent
        - strong [ref=e187]: "Content:"
        - text: "The pairing term $J_{--}$, which transforms $|\\uparrow\\rangle_i|\\uparrow\\rangle_j$ to $|\\downarrow\\rangle_i|\\downarrow\\rangle_j$, is driven by laser assistance through intermediate state $|F\\rangle$. The dipole-dipole interaction $J_{d2}$ couples $|\\uparrow\\rangle_i|F\\rangle_j$ to $|\\downarrow\\rangle_i|\\downarrow\\rangle_j$, giving $J_{--} = -U_p J_{d2}/\\Delta_p + O((J_{d2}, U_p)^4)$."
        - strong [ref=e188]: "Prior:"
        - text: "0.80"
        - strong [ref=e189]: "Belief:"
        - text: "0.72"
        - strong [ref=e190]: "Referenced by:"
        - text: noisy_and ->
        - code [ref=e191]: paper:kitaev_rydberg::kitaev_realization
        - text: ; deduction ->
        - code [ref=e192]: paper:kitaev_rydberg::laddi_novelty
      - heading "sign_achievement" [level=3] [ref=e193]
      - paragraph [ref=e194]:
        - strong [ref=e195]: "QID:"
        - code [ref=e196]: paper:kitaev_rydberg::sign_achievement
        - strong [ref=e197]: "Type:"
        - text: claim
        - strong [ref=e198]: "Role:"
        - text: independent
        - strong [ref=e199]: "Content:"
        - text: "The sign configurations of $J_{+-}^{x,y}$ and $J_{--}^{x,y}$ along x and y bonds can be achieved via on-site tuning of Raman potentials. Phases of $U_e$ ensure uniform sign for $U_e/\\Delta_e$ (giving $J_{+-}^x = J_{+-}^y$), while signs of $U_p$ exhibit a staggered pattern along rows (giving $J_{--}^x = -J_{--}^y$)."
        - strong [ref=e200]: "Prior:"
        - text: "0.85"
        - strong [ref=e201]: "Belief:"
        - text: "0.85"
        - strong [ref=e202]: "Referenced by:"
        - text: noisy_and ->
        - code [ref=e203]: paper:kitaev_rydberg::kitaev_realization
      - heading "zbond_coupling" [level=3] [ref=e204]
      - paragraph [ref=e205]:
        - strong [ref=e206]: "QID:"
        - code [ref=e207]: paper:kitaev_rydberg::zbond_coupling
        - strong [ref=e208]: "Type:"
        - text: claim
        - strong [ref=e209]: "Role:"
        - text: independent
        - strong [ref=e210]: "Content:"
        - text: "The $J_z$ term arises from intrinsic vdW interaction of Rydberg atoms, characterized by $V_{\\sigma\\sigma'} \\propto n_\\sigma n_{\\sigma'}$. From $s^z = (n_\\uparrow - n_\\downarrow)/2$, we obtain $J_z = V_{\\downarrow\\uparrow} + V_{\\uparrow\\downarrow} - V_{\\downarrow\\downarrow} - V_{\\uparrow\\uparrow}$. Along z bonds, the $J_{+-}$ and $J_{--}$ interactions are off-resonant and negligible due to different energy offsets at even and odd rows."
        - strong [ref=e211]: "Prior:"
        - text: "0.90"
        - strong [ref=e212]: "Belief:"
        - text: "0.90"
        - strong [ref=e213]: "Referenced by:"
        - text: noisy_and ->
        - code [ref=e214]: paper:kitaev_rydberg::kitaev_realization
      - heading "high_tunability" [level=3] [ref=e215]
      - paragraph [ref=e216]:
        - strong [ref=e217]: "QID:"
        - code [ref=e218]: paper:kitaev_rydberg::high_tunability
        - strong [ref=e219]: "Type:"
        - text: claim
        - strong [ref=e220]: "Role:"
        - text: independent
        - strong [ref=e221]: "Content:"
        - text: "The proposal offers high tunability for simulating both Kitaev A and B phases. The pure bond-dependent Ising couplings can be precisely achieved and further tuned by Raman potentials $U_{e,p}$. Adjusting $U_{e,p}$ adiabatically while keeping $J_z$ constant can drive the system from A phase ($J_x = J_y = 0$) to B phase ($J_x = J_y = J_z$)."
        - strong [ref=e222]: "Prior:"
        - text: "0.85"
        - strong [ref=e223]: "Belief:"
        - text: "0.79"
        - strong [ref=e224]: "Referenced by:"
        - text: deduction ->
        - code [ref=e225]: paper:kitaev_rydberg::laddi_novelty
      - heading "unitary_transform" [level=3] [ref=e226]
      - paragraph [ref=e227]:
        - strong [ref=e228]: "QID:"
        - code [ref=e229]: paper:kitaev_rydberg::unitary_transform
        - strong [ref=e230]: "Type:"
        - text: claim
        - strong [ref=e231]: "Role:"
        - text: orphaned
        - strong [ref=e232]: "Content:"
        - text: "A unitary transformation mapping $\\sigma_{y,z}$ to $-\\sigma_{y,z}$ in odd rows causes $J_z$ to change sign while leaving $J_{x,y}$ unchanged. This transforms ferromagnetic $J_z$ into antiferromagnetic interactions. The transformation also flips $h_{y,z}$ in odd rows, requiring staggered Zeeman configurations."
        - strong [ref=e233]: "Prior:"
        - text: "0.85"
        - strong [ref=e234]: "Belief:"
        - text: "0.85"
      - heading "zeeman_implementation" [level=3] [ref=e235]
      - paragraph [ref=e236]:
        - strong [ref=e237]: "QID:"
        - code [ref=e238]: paper:kitaev_rydberg::zeeman_implementation
        - strong [ref=e239]: "Type:"
        - text: claim
        - strong [ref=e240]: "Role:"
        - text: orphaned
        - strong [ref=e241]: "Content:"
        - text: "The $h_z$ term is obtained by setting detuning for the transition induced by Raman potential $U_p$ between $|\\downarrow\\rangle_i|\\downarrow\\rangle_j$ and $|\\uparrow\\rangle_i|\\uparrow\\rangle_j$. The $h_{x,y}$ terms are induced by microwaves driving spin-flip transitions, with independent control on odd and even rows."
        - strong [ref=e242]: "Prior:"
        - text: "0.80"
        - strong [ref=e243]: "Belief:"
        - text: "0.80"
    - generic [ref=e244]:
      - heading "numerics" [level=2] [ref=e245]
      - 'heading "Module: numerics" [level=1] [ref=e246]'
      - heading "principal_numbers" [level=3] [ref=e247]
      - paragraph [ref=e248]:
        - strong [ref=e249]: "QID:"
        - code [ref=e250]: paper:kitaev_rydberg::principal_numbers
        - strong [ref=e251]: "Type:"
        - text: setting
        - strong [ref=e252]: "Role:"
        - text: setting
        - strong [ref=e253]: "Content:"
        - text: The principal quantum numbers are chosen as $n_P = 44$, $n_D = 42$, and $n_F = 40$ to exemplify the high precision and feasibility of the realization.
      - heading "coupling_strengths" [level=3] [ref=e254]
      - paragraph [ref=e255]:
        - strong [ref=e256]: "QID:"
        - code [ref=e257]: paper:kitaev_rydberg::coupling_strengths
        - strong [ref=e258]: "Type:"
        - text: claim
        - strong [ref=e259]: "Role:"
        - text: independent
        - strong [ref=e260]: "Content:"
        - text: "For x, y bonds with length $a = 4.7 \\mu m$: $J_{x,y} \\simeq -4$ MHz. For z bonds with length $b = 4.2 \\mu m$: $J_z \\simeq 4.0$ MHz. On x, y bonds, $|J_z| < 0.16$ MHz, giving nearly pure Kitaev model."
        - strong [ref=e261]: "Prior:"
