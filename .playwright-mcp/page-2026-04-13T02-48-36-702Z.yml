    - generic [ref=e299]:
      - heading "detection" [level=2] [ref=e300]
      - 'heading "Module: detection" [level=1] [ref=e301]'
      - heading "bulk_detection_method" [level=3] [ref=e302]
      - paragraph [ref=e303]:
        - strong [ref=e304]: "QID:"
        - code [ref=e305]: paper:kitaev_rydberg::bulk_detection_method
        - strong [ref=e306]: "Type:"
        - text: setting
        - strong [ref=e307]: "Role:"
        - text: setting
        - strong [ref=e308]: "Content:"
        - text: "The bulk gap is detected through a minimal perturbation approach utilizing $c_i c_{j \\in (ij)"
        - emphasis [ref=e309]: "\\gamma}$ to excite Majorana fermions, equivalent to $s_i^\\gamma s_j^{\\gamma \\in (ij)"
