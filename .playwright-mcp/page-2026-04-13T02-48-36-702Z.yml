      - heading "longrange_suppression" [level=3] [ref=e265]
      - paragraph [ref=e266]:
        - strong [ref=e267]: "QID:"
        - code [ref=e268]: paper:kitaev_rydberg::longrange_suppression
        - strong [ref=e269]: "Type:"
        - text: claim
        - strong [ref=e270]: "Role:"
        - text: independent
