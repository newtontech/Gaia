# 推理模块 — 伽利略的核心论证
# 演示两种推理形式：
#   1. InferAction — 通用推理方法，带参数，可复用
#   2. Lambda — 一次性具体推理步骤，无参数

type: reasoning_module
name: reasoning

declarations:
  # === 引用外部知识 ===
  - type: ref
    name: heavier_falls_faster
    target: aristotle.heavier_falls_faster

  - type: ref
    name: thought_experiment_env
    target: setting.thought_experiment_env

  - type: ref
    name: vacuum_env
    target: setting.vacuum_env

  # === 通用推理方法（InferAction，带参数，可复用） ===

  # 归谬法 — 通用逻辑方法
  - type: infer_action
    name: reductio_ad_absurdum
    params:
      - name: hypothesis
        type: claim
      - name: env
        type: setting
    return_type: claim
    content: >
      对 {hypothesis} 运用归谬法：假设该命题为真，
      在 {env} 条件下推导出内部矛盾，从而证明该命题为假。
    prior: 0.9

  # 综合推理 — 从多条证据线汇聚得出结论
  - type: infer_action
    name: synthesize
    params:
      - name: evidence_a
        type: claim
      - name: evidence_b
        type: claim
      - name: env
        type: setting
    return_type: claim
    content: >
      综合 {evidence_a} 和 {evidence_b} 两条独立的证据线，
      在 {env} 条件下推导出统一的结论。
    prior: 0.9

  # === 中间结论和最终结论 ===
  - type: claim
    name: aristotle_contradicted
    content: ""
    prior: 0.5

  - type: claim
    name: air_resistance_is_confound
    content: ""
    prior: 0.5

  - type: claim
    name: vacuum_prediction
    content: ""
    prior: 0.5

  # === 推理链 ===

  # 链1：归谬法反驳（使用通用 InferAction）
  - type: chain_expr
    name: refutation_chain
    steps:
      - step: 1
        ref: heavier_falls_faster
      - step: 2
        apply: reductio_ad_absurdum
        args:
          - ref: heavier_falls_faster
            dependency: direct
          - ref: thought_experiment_env
            dependency: indirect
        prior: 0.9
      - step: 3
        ref: aristotle_contradicted

  # 链2：识别混淆因素（使用 Lambda — 一次性具体推理）
  - type: chain_expr
    name: confound_chain
    steps:
      - step: 1
        ref: heavier_falls_faster
      - step: 2
        lambda: >
          观察到在密度越大的介质中，轻重物体的下落速度差异越小。
          水中的差异小于空气中，油中的差异小于水中。
          因此真正造成速度差异的原因是空气阻力，而非重量本身。
          推及真空（无阻力），差异将完全消失。
        prior: 0.85
      - step: 3
        ref: air_resistance_is_confound

  # 链3：综合最终预测（使用通用 InferAction）
  - type: chain_expr
    name: synthesis_chain
    steps:
      - step: 1
        ref: aristotle_contradicted
      - step: 2
        apply: synthesize
        args:
          - ref: aristotle_contradicted
            dependency: direct
          - ref: air_resistance_is_confound
            dependency: direct
          - ref: vacuum_env
            dependency: indirect
        prior: 0.9
      - step: 3
        ref: vacuum_prediction

export:
  - vacuum_prediction
  - aristotle_contradicted
  - air_resistance_is_confound
