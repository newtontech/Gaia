title: Open Questions — Sak-1977
knowledge:
- type: question
  name: open_questions
  content: 'The paper explicitly acknowledges that the central dividing-line result and the phase-boundary curve have been
    checked in controlled perturbative expansions only near the two endpoints (near d=4 via the 4−ϵ expansion and near d=2
    via the d=2+ϵ low-temperature expansion for n>2). The shape of the middle portion of the curve that separates SR and LR
    domains for dimensions between these endpoints remains conjectural: it is probable that the same dividing criterion $\sigma=2-\eta_{SR}$
    holds for all dimensions 2<d<4, but a general nonperturbative or uniformly valid proof covering the full interval 2<d<4
    has not been found. This unresolved problem — proving the dividing-line theorem (and mapping the full curve of stability
    boundaries) for intermediate dimensions beyond the two perturbative limits treated — is stated directly by the author
    as future/proof-required work.'
  prior: 0.5
