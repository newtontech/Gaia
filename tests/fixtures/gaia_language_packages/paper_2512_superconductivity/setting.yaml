type: setting_module
name: setting
title: Settings — 2512_Superconductivity
knowledge:
- type: setting
  name: pair_propagator_scale_separation
  content: 'The two-particle pair propagator defined as the product of single-particle imaginary-time Green''s functions for
    electrons, $G_{\mathbf{k}\omega}G_{-\mathbf{k},-\omega}$ (where $\mathbf{k}$ is crystal momentum, $\omega$ is a fermionic
    Matsubara frequency $\omega=\pi T(2n+1)$ for integer $n$, and $T$ is temperature), can be written as the sum of a coherent,
    infrared (IR), BCS- type contribution and an incoherent, ultraviolet (UV), regular remainder according to

    $G_{\mathbf{k}\omega}G_{-\mathbf{k},-\omega} = \Pi_{\mathrm{BCS}}(\mathbf{k},\omega) + \phi_{\mathbf{k}\omega}$,

    with the coherent part defined by

    $\Pi_{\mathrm{BCS}}(\mathbf{k},\omega) \equiv \dfrac{(z^{\mathrm{e}})^2}{\left(\dfrac{\omega}{z_{\mathrm{w}}^{\mathrm{ph}}}\right)^2
    + \epsilon_{\mathbf{k}}^2}\,\Theta(\omega_{c} - |\epsilon_{\mathbf{k}}|)$,

    where (i) $z^{\mathrm{e}}$ is the quasiparticle residue arising from electron–electron interactions assumed frequency-
    and momentum- independent on the low-energy scales of interest, (ii) $z_{\mathrm{w}}^{\mathrm{ph}}$ is a frequency-dependent
    quasiparticle weight factor due to electron–phonon coupling, (iii) $\epsilon_{\mathbf{k}}$ is the linearized quasiparticle
    dispersion measured relative to the Fermi surface, (iv) $\Theta(\cdot)$ is the unit step function, (v) $\omega_{c}$ is
    an intermediate cutoff energy chosen to satisfy the hierarchy $\omega_{\mathrm{D}}\ll\omega_{c}\ll E_{\mathrm{F}}$ (with
    $\omega_{\mathrm{D}}$ a typical phonon frequency and $E_{\mathrm{F}}$ the Fermi energy), and (vi) $\phi_{\mathbf{k}\omega}$
    denotes the regular incoherent remainder; this specific decomposition of the pair propagator into $\Pi_{\mathrm{BCS}}$
    and $\phi$ is taken as an assumption used to define the IR/UV separation for subsequent downfolding.'
  prior: 0.7
  dependency: direct
- type: setting
  name: adiabatic_migdal_small_parameter
  content: For the electron–phonon problem considered, the adiabatic small parameter $\dfrac{\omega_{\mathrm{D}}}{E_{\mathrm{F}}}\ll
    1$ (where $\omega_{\mathrm{D}}$ is a characteristic phonon frequency and $E_{\mathrm{F}}$ is the electronic Fermi energy)
    holds, and as a consequence Migdal- type vertex corrections involving phonon lines are parametrically suppressed by $O(\omega_{\mathrm{D}}/E_{\mathrm{F}})$
    and may be neglected at the stated order of approximation in the derivation of the low- energy Bethe–Salpeter equation.
  prior: 0.95
  dependency: direct
- type: setting
  name: plasmon_gap_cross_sector_suppression
  content: "The long- wavelength, low- frequency asymptotic form of the screened (plasmon) channel of the dynamical Coulomb\
    \ interaction may be approximated conservatively by the plasmon- pole form\n$W^{\\mathrm{s}}_{q,\\Omega} = \\dfrac{4\\\
    pi e^{2}}{q^{2}}\\dfrac{\\Omega^{2}}{\\Omega^{2} + \\omega_{\\mathrm{p}}^{2}}$,\nwhere $q$ is the momentum transfer, $\\\
    Omega$ is a bosonic Matsubara frequency, and $\\omega_{\\mathrm{p}}$ is a characteristic plasmon frequency, and provided\
    \ the chosen intermediate cutoff $\\omega_{c}$ satisfies $\\omega_{\\mathrm{p}}\\gg\\omega_{c}$ the phase- space integral\
    \ of products of this plasmon form with UV incoherent pair propagator pieces $\\phi_{\\mathbf{k}\\omega}$ yields contributions\
    \ suppressed parametrically by the factor $\\dfrac{\\omega_{c}^{2}}{\\omega_{\\mathrm{p}}^{2}}$ so that cross- sector\
    \ terms mixing UV incoherent propagators and long- wavelength dynamical Coulomb effects are negligible at the claimed\
    \ order.\n [[15]]"
  prior: 0.8
  dependency: direct
- type: setting
  name: perturbative_high_frequency_elimination
  content: Given that the particle- particle irreducible high- frequency sector operator $\tilde{\Gamma}_{HH}\phi$ describes
    only non- singular, regular UV processes and that cross- sector coupling terms (e.g., those estimated to be $O(\omega_{c}^{2}/\omega_{\mathrm{p}}^{2})$)
    are small, the high- frequency anomalous vertex component $\Lambda_{H}$ (defined for $|\omega|>\omega_{c}$) can be solved
    for perturbatively from the coupled two- sector Bethe–Salpeter equations and substituted back into the low- energy equation
    to produce an effective low- energy particle- particle irreducible vertex $\tilde{\Gamma}^{\omega_{c}}$ acting solely
    within $|\omega|<\omega_{c}$, with omitted corrections bounded by the small parameters $\dfrac{\omega_{\mathrm{D}}}{E_{\mathrm{F}}}$,
    $\dfrac{\omega_{c}^{2}}{\omega_{\mathrm{p}}^{2}}$, and $\dfrac{T}{\omega_{c}}$.
  prior: 0.75
  dependency: direct
- type: setting
  name: fermi_surface_projection_regularization
  content: 'After integrating out high- energy pair fluctuations up to the cutoff $\omega_{c}$, the resulting effective low-
    energy particle- particle irreducible vertex $\tilde{\Gamma}^{\omega_{c}}(\mathbf{k}\omega;\mathbf{k}''\omega'')$ is assumed
    to be a function that is regular on momentum variations of order the Fermi- surface curvature scale so that angular (directional)
    dependence along the Fermi surface is smooth and an average over Fermi- surface directions,

    $\langle\cdots\rangle_{\mathrm{FS}}$, is meaningful; this regularity assumption justifies projecting momenta onto the
    Fermi surface and defining frequency- only kernels such as the Fermi- surface- averaged phonon- mediated interaction

    $\lambda_{\omega\omega''} \equiv -(z^{\mathrm{e}})^{2}N^{*}_{F}\langle W^{\mathrm{ph}}_{\mathbf{k}_{F}-\mathbf{k}''_{F},\omega-\omega''}\rangle_{\mathbf{k}_{F},\mathbf{k}''_{F}}$,

    where $N^{*}_{F}$ is the quasiparticle density of states and $z^{\mathrm{e}}$ the quasiparticle residue entering the definition.'
  prior: 0.8
  dependency: direct
- type: setting
  name: landau_fermi_liquid_quasiparticles_exist
  content: 'In the low- energy regime of interest the electronic system is a Landau Fermi liquid with well- defined quasiparticles:
    there exists a finite quasiparticle residue $z^{\mathrm{e}}>0$ and a linearized quasiparticle dispersion $\epsilon_{\mathbf{k}}$
    in a finite window around the Fermi surface such that low- energy pair propagator singularities are of BCS- type and can
    be treated using the coherent $\Pi_{\mathrm{BCS}}$ contribution described above.'
  prior: 0.85
  dependency: direct
- type: setting
  name: homotopic_mapping_algebraic_relation
  content: 'For a temperature $T$ and chosen intermediate cutoff $\omega_{c}$ the algebraic relation

    $\mu_{\omega_{c}}(\xi) \equiv \dfrac{\gamma_{T}(\xi)}{1 - \gamma_{T}(\xi)\ln(\omega_{c}/T)}$

    (where $\gamma_{T}(\xi)$ is the temperature- dependent, dimensionless two- quasiparticle scattering amplitude expanded
    as a power series in an auxiliary parameter $\xi$ with physical value $\xi=1$ and $\mu_{\omega_{c}}(\xi)$ is defined as
    a new series in $\xi$) reorganizes the logarithmically divergent $\ln T$ contributions appearing order- by- order in the
    original $\gamma_{T}(\xi)$ expansion so that the coefficients of the resulting $\mu_{\omega_{c}}(\xi)$ series are temperature-
    independent and the low- $T$ growth $\propto [\ln(E_{F}/T)]^{N}$ of partial sums is eliminated order- by- order.'
  prior: 0.6
  dependency: direct
- type: setting
  name: analyticity_of_gamma_in_xi_domain
  content: The temperature- dependent scattering amplitude function $\gamma_{T}(\xi)$, defined as the analytic continuation
    of the $\xi$- expansion of diagrammatic sums, is analytic as a function of complex $\xi$ inside a domain that contains
    the real interval between $\xi=0$ and $\xi=1$, and therefore the finite-order homotopic series for $\mu_{\omega_{c}}(\xi)$
    can be accelerated and analytically continued from small $\xi$ to $\xi=1$ using conformal- map style resummation and series-
    acceleration techniques.
  prior: 0.5
  dependency: direct
- type: setting
  name: vdiagmc_renormalized_yukawa_expansion_accuracy
  content: Variational Diagrammatic Monte Carlo (VDiagMC) sampling of Feynman graphs built from a renormalized Yukawa interaction
    $v_{\mathrm{R}}(\mathbf{q}) \equiv \dfrac{4\pi e^{2}}{q^{2} + \lambda_{\mathrm{R}}}$ with an optimized screening parameter
    $\lambda_{\mathrm{R}}$ and accompanying counterterms, together with computational- graph implementation and importance-
    sampling integration, yields accurate, numerically stable estimates of the coefficients $\gamma_{T}^{(n)}$, quasiparticle
    residue series $z^{\mathrm{e}}(\xi)$, and effective- mass series $m^{*}(\xi)$ to sufficiently high order that the homotopic
    mapping and subsequent resummation can produce converged results for the pseudopotential within the quoted systematic
    uncertainties.
  prior: 0.7
  dependency: direct
- type: setting
  name: conformal_map_resummation_effectiveness
  content: Application of conformal- map style resummation and standard series- acceleration protocols to the finite- order
    homotopic series $\mu_{\omega_{c}}(\xi)$ (constructed from the VDiagMC coefficients and the algebraic homotopy in P7)
    produces a stable accelerated series whose partial sums can be analytically continued to $\xi=1$ with controlled sensitivity
    to reasonable variations in the conformal map and acceleration parameters, yielding a reliable estimate of $\mu_{\omega_{c}}(\xi=1)$
    provided the analyticity assumption of P8 holds.
  prior: 0.6
  dependency: direct
- type: setting
  name: dfpt_quasiparticle_vertex_cancellation
  content: "For the three- dimensional uniform electron gas (UEG) at electronic density parameter values $r_{s}$ in the range\
    \ $1\\le r_{s}\\le 5$ (where $r_{s}$ is the Wigner–Seitz radius measured in atomic units), the many- body quasiparticle\
    \ electron–phonon vertex product defined as $z^{e}\\dfrac{v_{\\mathbf{q}}}{\\epsilon_{\\mathbf{q}}}\\Gamma_{3}^{e}(\\\
    mathbf{k};\\mathbf{q})$ (with $z^{e}$ the electronic quasiparticle residue, $v_{\\mathbf{q}} = 4\\pi e^{2}/q^{2}$ the\
    \ bare Coulomb potential, $\\epsilon_{\\mathbf{q}}$ the dielectric screening factor, and $\\Gamma_{3}^{e}(\\mathbf{k};\\\
    mathbf{q})$ the three- point electronic vertex correction) is numerically very close to the density- functional perturbation\
    \ theory (DFPT) screened ionic potential\n$\\dfrac{v_{\\mathbf{q}}}{1 - (v_{\\mathbf{q}} + f_{\\mathrm{xc}})\\chi_{0}^{e}(\\\
    mathbf{q})}\\equiv g^{\\mathrm{KS}}(\\mathbf{q})$\n(with $\\chi_{0}^{e}$ the Kohn–Sham Lindhard response and $f_{\\mathrm{xc}}$\
    \ the LDA exchange–correlation kernel) for momentum transfers relevant to Fermi- surface scattering $|\\mathbf{q}|\\le\
    \ 2k_{F}$, up to small residual $ \\mathbf{k}$-dependence; this near- cancellation of separate many- body renormalizations\
    \ justifies using DFPT- computed $g^{\\mathrm{KS}}(\\mathbf{q})$ as a proxy for the quasiparticle electron–phonon coupling\
    \ in simple metals within the present framework.\n [Fig. 8]"
  prior: 0.7
  dependency: direct
- type: setting
  name: toy_model_rpa_and_phonon_kernel
  content: "A toy- model used to validate the downfolding replaces the particle- particle- irreducible electronic vertex by\
    \ the dynamically screened Coulomb interaction within the random phase approximation (RPA), $W_{\\mathrm{RPA}}(\\mathbf{q},\\\
    nu) = v_{\\mathbf{q}}/(1 - v_{\\mathbf{q}}\\Pi^{0}_{\\mathbf{q}\\nu})$ with $v_{\\mathbf{q}}=4\\pi e^{2}/q^{2}$ and $\\\
    Pi^{0}$ the noninteracting polarization, and uses a model phonon- mediated interaction\n$W_{q\\nu}^{\\mathrm{ph}} = -\\\
    dfrac{g/N_{F}}{1 + (q/2k_{F})^{2}}\\dfrac{\\omega_{q}^{2}}{\\nu^{2} + \\omega_{q}^{2}}$\nwith dispersion $\\omega_{q}^{2}=\\\
    omega_{D}^{2}(q/k_{F})^{2}/(1+(q/k_{F})^{2})$ and chosen coupling strength $g=0.4$; these modeling choices are employed\
    \ to produce a conservative, representative test of screening plus phonon kernels in a conventional-metal parameter regime.\n\
    \ [[23]]"
  prior: 0.7
  dependency: indirect
- type: setting
  name: ueg_mapping_of_real_metals
  content: "Mapping real simple metals to the uniform electron gas (UEG) model is performed by extracting conduction- electron\
    \ density and an effective band mass $m_{\\mathrm{b}}$ from density- functional band-structure calculations, computing\
    \ the material Wigner–Seitz radius $r_{s}$ appropriate to conduction electrons, rescaling $r_{s}\\to (m_{\\mathrm{b}}/m)\\\
    ,r_{s}$ when mapping to the precomputed UEG pseudopotential table, and interpolating the VDiagMC $\\mu_{E_{F}}(r_{s})$\
    \ results at the rescaled $r_{s}$ to obtain the material pseudopotential; this mapping neglects additional material- specific\
    \ complications such as multiband screening, Umklapp processes, and core- electron screening.\n [Fig. 9]"
  prior: 0.7
  dependency: indirect
- type: setting
  name: numerical_truncation_and_resummation_details
  content: "The practical VDiagMC implementation and resummation protocol involve multiple algorithmic and numerical choices—finite\
    \ maximal expansion order, optimization of the Yukawa screening parameter $\\lambda_{\\mathrm{R}}$, choice of conformal\
    \ map and acceleration parameters, sampling importance- sampling settings, and error estimation procedures— such that\
    \ quoted systematic uncertainties on resummed results reflect finite- order truncation and resummation- parameter sensitivity\
    \ rather than strict mathematical error bounds.\n [Fig. 14]"
  prior: 0.7
  dependency: indirect
- type: setting
  name: cutoff_hierarchy_and_regime
  content: The downfolding derivation assumes an intermediate cutoff energy $\omega_{c}$ can be chosen to satisfy the hierarchy
    $\omega_{\mathrm{D}}\ll\omega_{c}\ll\omega_{\mathrm{p}}$ (with $\omega_{\mathrm{p}}$ the plasmon frequency) and that temperature
    obeys $T\ll\omega_{c}$ so that $T/\omega_{c}$ corrections are small; the physical regime of interest is three- dimensional
    simple metals with typical parameters where these inequalities can be met.
  prior: 0.7
  dependency: indirect
