# 后续模块 — 未来研究的开放问题

type: follow_up_module
name: follow_up
title: "后续问题 — 未来研究"

knowledge:
  - type: ref
    name: vacuum_prediction
    target: reasoning.vacuum_prediction

  - type: question
    name: follow_up_question
    content: >
      能否在足够接近真空的条件下直接比较重球与轻球的下落时间？
      如果日常差异确实来自空气阻力，那么真正决定性的实验应当在几乎无介质的环境中完成。

  - type: chain_expr
    name: next_steps
    steps:
      - step: 1
        ref: vacuum_prediction
      - step: 2
        lambda: >
          既然该 package 已经从思想实验、介质分析和斜面实验三条线索
          汇聚到“真空中等速下落”的预测，
          下一步就应当寻找足够接近真空的直接实验来验证这一点。
      - step: 3
        ref: follow_up_question

export:
  - follow_up_question
