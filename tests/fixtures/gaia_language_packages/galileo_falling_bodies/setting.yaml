# 背景模块 — 上下文和定义

type: setting_module
name: setting

declarations:
  - type: setting
    name: thought_experiment_env
    content: >
      想象一个重球 H 和一个轻球 L 从同一高度落下。
      先分别考虑它们各自的“自然下落速度”，再考虑把二者用细绳绑成
      复合体 HL 后一起下落，会得到什么结果。
    prior: 1.0

  - type: setting
    name: vacuum_env
    content: >
      一个理想化的无空气阻力环境，
      只保留重力作用，不让介质阻力参与落体过程。
    prior: 1.0

export:
  - thought_experiment_env
  - vacuum_env
