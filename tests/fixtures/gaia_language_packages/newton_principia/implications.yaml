# 含义模块 — 牛顿推导与伽利略和亚里士多德的关系
# 演示跨 package 引用和 relation 类型

type: reasoning_module
name: implications

knowledge:
  # === 引用本 package 的结论 ===
  - type: ref
    name: acceleration_independent_of_mass
    target: derivation.acceleration_independent_of_mass

  # === 引用 Galileo package 的结论 ===
  - type: ref
    name: galileo_vacuum_prediction
    target: galileo_falling_bodies.vacuum_prediction

  - type: ref
    name: galileo_aristotle_contradicted
    target: galileo_falling_bodies.aristotle_contradicted

  - type: ref
    name: aristotle_law
    target: galileo_falling_bodies.heavier_falls_faster

  # === 等价关系：牛顿的 a=g 与伽利略的真空预测 ===

  - type: equivalence
    name: galileo_equivalence
    between:
      - acceleration_independent_of_mass
      - galileo_vacuum_prediction
    content: >
      牛顿从 F=ma 和 F=mg 推导出的"a=g 与质量无关"
      与伽利略从思想实验和经验分析预测的"真空中不同重量物体等速下落"
      在物理含义上等价。
      区别在于：伽利略是经验论证（归谬法 + 介质分析 + 斜面实验），
      牛顿是理论推导（从基本定律出发的演绎）。

  # === 牛顿独立反驳亚里士多德 ===

  - type: claim
    name: newton_contradicts_aristotle
    content: >
      牛顿的 a=g 推导从理论上排除了"下落速度与重量成正比"的可能：
      如果加速度不依赖质量，那么亚里士多德的 v∝W 就不是自然界的规律。
      这与伽利略的归谬法反驳独立，提供了第二条反驳路径。
    prior: 0.5

  - type: claim
    name: two_path_rejection_of_aristotle
    content: >
      亚里士多德落体学说同时遭到两条方法上不同的反驳路径削弱：
      伽利略通过绑球归谬法暴露其内在矛盾，
      牛顿则从更基本的力学定律推导出与之不相容的结果。
      两条路径相互独立地汇聚到同一结论。
    prior: 0.5

  - type: contradiction
    name: newton_vs_aristotle
    between:
      - acceleration_independent_of_mass
      - aristotle_law
    content: >
      牛顿的 a=g（加速度与质量无关）直接矛盾于
      亚里士多德的 v∝W（下落速度与重量成正比）。
      前者是理论推导，后者是未经控制的经验归纳。

  # === 推理链 ===

  - type: infer_action
    name: derive_theoretical_contradiction
    params:
      - name: newton_result
        type: claim
      - name: aristotle_claim
        type: claim
    return_type: claim
    content: >
      {newton_result} 断言加速度与质量无关；{aristotle_claim} 断言速度与重量成正比。
      在自由落体条件下（无介质阻力），这两个命题不能同时为真。
      牛顿的推导基于更基本的力学定律，亚里士多德的归纳缺乏对混淆变量的控制，
      因此应当接受前者、拒绝后者。
    prior: 0.95

  - type: infer_action
    name: synthesize_independent_refutations
    params:
      - name: galileo_result
        type: claim
      - name: newton_result
        type: claim
    return_type: claim
    content: >
      {galileo_result} 来自思想实验中的归谬法，
      {newton_result} 来自基本力学定律的演绎推导。
      二者在方法上不同，却都指向同一个判断：
      亚里士多德的落体规律不能作为普遍定律保留。
    prior: 0.94

  - type: chain_expr
    name: theoretical_contradiction_chain
    steps:
      - step: 1
        ref: acceleration_independent_of_mass
      - step: 2
        apply: derive_theoretical_contradiction
        args:
          - ref: acceleration_independent_of_mass
            dependency: direct
          - ref: aristotle_law
            dependency: direct
        prior: 0.95
      - step: 3
        ref: newton_contradicts_aristotle

  - type: retract_action
    name: retract_aristotle_theoretically
    target: aristotle_law
    reason: newton_vs_aristotle
    content: >
      牛顿的理论推导提供了第二条独立的反驳路径：
      伽利略通过归谬法暴露了亚里士多德定律的内在矛盾，
      牛顿则从更基本的力学定律直接推导出与之矛盾的结论。
      两条独立路径汇聚，进一步降低亚里士多德定律的可信度。
    prior: 0.95

  - type: chain_expr
    name: two_path_rejection_chain
    steps:
      - step: 1
        ref: galileo_aristotle_contradicted
      - step: 2
        apply: synthesize_independent_refutations
        args:
          - ref: galileo_aristotle_contradicted
            dependency: direct
          - ref: newton_contradicts_aristotle
            dependency: direct
        prior: 0.94
      - step: 3
        ref: two_path_rejection_of_aristotle

export:
  - galileo_equivalence
  - newton_contradicts_aristotle
  - newton_vs_aristotle
  - two_path_rejection_of_aristotle
