- type: claim
  name: observation_of_bulk_superconductivity_in_tlcabacuo_with_onset_120_k_and_zero_res
  content: "Bulk superconductivity was observed in samples of the Tl–Ca/Ba–Cu–O system: the electrical resistance of typical\
    \ samples begins to drop sharply at approximately 120 K (onset), the transition midpoint is at approximately 110 K, and\
    \ zero electrical resistance is achieved above 100 K (example values for a furnace-cooled $Tl_{2}Ca_{1.5}BaCu_{3}O_{8.5+x}$\
    \ sample: transition midpoint 112 K and zero-resistance temperature 103 K). The superconducting transition is broad (typically\
    \ >20 K) in these polycrystalline pellets.\n      \n       [Fig. 1]"
  prior: 0.5
- type: claim
  name: synthesis_procedure_for_tlcabacuo_employing_bacu3o4_melt_solid_reaction_and_rapi
  content: 'A reproducible sample preparation procedure for Tl–Ca/Ba–Cu–O materials was established: stoichiometric mixtures
    of $Tl_{2}O_{3}$, CaO and $BaCu_{3}O_{4}$ were mixed, pressed into pellets (typical diameter 7 mm, thickness 2–3 mm),
    placed into a tube furnace preheated to $880$–$910^{\circ}\mathrm{C}$, heated in flowing oxygen for $3$–$5$ minutes and
    then quenched to room temperature in air; selected specimens were furnace-cooled or subsequently annealed at $450^{\circ}\mathrm{C}$
    in flowing oxygen for several hours. The use of $BaCu_{3}O_{4}$ as a starting material — because it has the lowest melting
    point among the Ba–Cu oxides and the molten phase is extremely fluid — was adopted to promote melt–solid reactions that
    are believed to produce more complete reaction than typical solid-state sintering.'
  prior: 0.5
- type: claim
  name: qualitative_magnetic_evidence_for_superconductivity_levitation_and_ac_susceptibi
  content: "Qualitative magnetic measurements indicate superconducting diamagnetism in Tl–Ca/Ba–Cu–O samples: a specimen of\
    \ nominal composition $Tl_{2}Ca_{2}BaCu_{3}O_{9+x}$ levitates above a magnetic field of approximately $5{,}000$ G after\
    \ immersion in liquid nitrogen, and a $Tl_{2}Ca_{1.5}BaCu_{3}O_{8.5+x}$ sample shows a temperature-dependent a.c. susceptibility\
    \ with an onset of diamagnetic response that occurs somewhat below the initial resistive drop in the same material (a\
    \ behaviour previously observed in non-stoichiometric rare-earth superconductors). Quantitative d.c. magnetization measurements\
    \ were stated to be in progress.\n      \n       [Fig. 2; Fig. 3]"
  prior: 0.5
- type: claim
  name: dependence_of_superconductivity_on_annealing_and_caba_ratio_semiconducting_behav
  content: 'The superconducting behaviour of Tl–Ca/Ba–Cu–O samples depends on processing and composition: annealing at $450^{\circ}\mathrm{C}$
    in flowing oxygen slightly improves superconductivity in Tl–Ca/Ba–Cu–O samples (whereas the same anneal depresses or destroys
    superconductivity in Tl–Ba–Cu–O samples); variation of the Ca/Ba ratio influences superconductivity; and related Tl–Ca–Cu–O
    compositions prepared under similar conditions exhibit semiconducting temperature dependence down to liquid-nitrogen temperature.
    Experiments to identify an optimum Ca/Ba ratio were reported to be underway.'
  prior: 0.5
- type: claim
  name: demonstration_that_multiple_slip_can_occur_in_diamond_under_point_loading_at_100
  content: Multiple slip (extensive dislocation movement) can be induced in diamond by the pressure transmitted through point-loading
    using a softer indenter material (a cubic boron nitride cone) at a temperature of $1{,}000^{\circ}\mathrm{C}$ and under
    a nominal contact pressure of about $10\ \mathrm{GPa}$ (title-stated conditions). This shows that substantial dislocation
    activity in diamond can occur at homologous temperatures below previously emphasized values derived from three-point bend
    tests.
  prior: 0.5
- type: claim
  name: methodological_route_to_prepare_specimens_with_controlled_dislocation_densities
  content: The point-loading technique using a softer, high-pressure indenter (cubic boron nitride cone) at elevated temperature
    provides a practical specimen-preparation method that introduces a controlled density of dislocations into diamond (and
    related hard crystals) at homologous temperatures below $0.3\,T_{m}$ (where $T_{m}$ is the melting point), enabling samples
    suitable for electron microscopy and X-ray topography.
  prior: 0.5
- type: claim
  name: conceptual_implication_microplasticity_matters_for_performance_of_crystalline_en
  content: The experimental observation that multiple slip can be induced in diamond under contact pressures at $1{,}000^{\circ}\mathrm{C}$
    emphasizes that microplasticity (dislocation-mediated deformation at microstructural scales) can play a significant role
    in the contact deformation and mechanical performance of crystalline engineering ceramics and must be considered in their
    application and performance analyses.
  prior: 0.5
