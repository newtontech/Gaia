  - step: 2
    lambda: 'Define the isotope-effect coefficient and describe the isotope-substitution experiment: define $\alpha$ as the
      isotope-effect coefficient via $\alpha = -\dfrac{d\ln T_{c}}{d\ln M}$ where $M$ is the atomic mass of the hydrogen isotope
      (so $M$ is the mass of H for hydride and of D for deuteride); experimentally, hydrogen (H) was substituted by deuterium
      (D) in analogous samples (yielding YD$_{6}$ and YD$_{9}$), and the superconducting transition temperatures for the deuterides
      were measured under the same or comparable pressure conditions.'
    prior: 0.7
  - step: 3
    ref: paired_hydride_deuteride_tc_measurements
  - step: 4
    lambda: "Report the observed isotope shifts in $T_{c}$ and the computed $\\alpha$ values: the substitution of H by D shifted\
      \ measured $T_{c}$ downward (for example, YD$_{6}$ showed $T_{c}\\approx168\\,$K at 173 GPa where the corresponding\
      \ hydride had a higher $T_{c}$, and YD$_{9}$ showed $T_{c}\\approx172\\,$K at 205 GPa); using $T_{c}$ values for paired\
      \ hydride/deuteride measurements in the $183\\text{–}205\\,$GPa range, the authors computed $\\alpha\\approx0.39$ for\
      \ bcc-YH$_{6}$/YD$_{6}$ and $\\alpha\\approx0.50$ for hcp-YH$_{9}$/YD$_{9}$ according to the defined formula.\n [Fig.\
      \ 4]"
    prior: 0.7
    refs:
    - setting.paired_hydride_deuteride_tc_measurements
  - step: 5
    ref: isotope_exponent_interpreted_as_phonon_pairing
  - step: 6
    lambda: "Compare with theoretical/harmonic expectation and interpret mechanism: recall the harmonic Bardeen–Cooper–Schrieffer\
      \ (BCS) limit gives an isotope exponent of $\\alpha=0.5$ for a purely harmonic phonon-mediated pairing mechanism (the\
      \ BCS theory is the conventional electron–phonon superconductivity theory); the experimentally obtained $\\alpha$ values\
      \ (0.39 and 0.50) thus are consistent with a conventional phonon-assisted pairing mechanism, with the $\\alpha=0.39$\
      \ value for YH$_{6}$ indicating deviations from the ideal harmonic limit attributable to anharmonic phonon effects and\
      \ contributions of acoustic phonons to electron–phonon coupling as discussed by the authors.\n [[1]]\n [Fig. 4]"
    prior: 0.7
    refs:
    - setting.isotope_exponent_interpreted_as_phonon_pairing
  - step: 7
    lambda: 'Conclude that the isotope effect supports a phonon-mediated mechanism: because replacing hydrogen with the heavier
