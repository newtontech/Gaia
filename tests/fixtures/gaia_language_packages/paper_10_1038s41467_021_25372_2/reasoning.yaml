  name: chain_demonstration_of_a_conventional_phonon_mediated_isotope_effect_with_measured_iso
  edge_type: deduction
  steps:
  - step: 1
    lambda: 'Start from the established experimental superconducting phases and their measured $T_{c}$: take as known the
      existence of superconductivity in bcc-YH$_{6}$/YD$_{6}$ and hcp-YH$_{9}$/YD$_{9}$ with measured $T_{c}$ values determined
