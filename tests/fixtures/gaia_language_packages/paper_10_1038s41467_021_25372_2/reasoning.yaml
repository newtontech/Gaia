- type: claim
  name: synthesis_and_crystal_structure_identification_of_yttrium_hydrides_yh3_yh4_yh6_a
  content: "Yttrium hydrides with nominal compositions YH$_{3}$, YH$_{4}$, YH$_{6}$ and YH$_{9}$ were synthesized in a diamond\
    \ anvil cell under hydrogen (H$_{2}$ or D$_{2}$) at megabar pressures and, when required, with pulsed-laser heating. Their\
    \ crystal structures were determined by X-ray powder diffraction and Rietveld/Le Bail refinement and assigned as follows:\
    \ Fm-3m for YH$_{3}$ (fcc-YH$_{3}$), 14/mmm for YH$_{4}$ (bct-YH$_{4}$), Im-3m for YH$_{6}$ (bcc-YH$_{6}$), and P6$_{3}$/mmc\
    \ for YH$_{9}$ (hcp-YH$_{9}$). The experimentally measured lattice parameters and volumes as functions of pressure are\
    \ well described by Vinet equations of state fitted to the data, and the lattice volumes and c/a ratios agree with prior\
    \ theoretical predictions for these compositions. Independent composition estimates based on the hydrogen-induced volume\
    \ expansion V$_{H}$ yield approximate hydrogen contents YH$_{5.7(3)}$ and YH$_{8.5(5)}$ for the hydrogen-richer phases\
    \ assigned to bcc and hcp structures. \n      \n       [Fig. 1; Fig. 2]"
  prior: 0.5
- type: claim
  name: observation_of_high_temperature_superconductivity_in_bcc_yh6_and_hcp_yh9_with_qu
  content: "Two synthesized yttrium hydride phases are superconducting: Im-3m (bcc) YH$_{6}$ exhibits superconducting transitions\
    \ with a dome-shaped pressure dependence and a maximum measured T$_{c}$ of 224 K (measured maximum in reported data) at\
    \ approximately 166 GPa (with other samples and conditions reporting T$_{c}$ values near 220 K at pressures around 183\
    \ GPa), and P6$_{3}$/mmc (hcp) YH$_{9}$ exhibits superconductivity with a dome-shaped pressure dependence and a maximum\
    \ measured T$_{c}$ of 243 K at 201 GPa. In some samples, transformation of YH$_{6}$ into YH$_{9}$ by laser heating shifts\
    \ the superconducting transition upward (e.g., from ~211 K for YH$_{6}$ to ~243 K after formation of YH$_{9}$ in the same\
    \ sample). The T$_{c}$(P) dependences for both phases show initial increase to a maximum and then decreasing T$_{c}$ with\
    \ further pressure increase.\n      \n       [Fig. 4]"
  prior: 0.5
- type: claim
  name: demonstration_of_a_conventional_phonon_mediated_isotope_effect_with_measured_iso
  content: "Substituting hydrogen with deuterium in the synthesized hydrides shifts the superconducting transition to lower\
    \ temperatures: measured T$_{c}$ values for YD$_{6}$ and YD$_{9}$ are lower than their hydrogen counterparts. Quantitatively,\
    \ using the definition $\\alpha = -\\frac{d\\ln T_{c}}{d\\ln M}$ with M the atomic mass, the isotope-effect coefficient\
    \ is $\\alpha \\approx 0.39$ for bcc-YH$_{6}$/YD$_{6}$ and $\\alpha \\approx 0.50$ for hcp-YH$_{9}$/YD$_{9}$ (values obtained\
    \ from T$_{c}$ measurements in the 183–205 GPa pressure range). The observed isotope shift supports a phonon-assisted\
    \ (conventional) superconducting pairing mechanism in these yttrium hydrides.\n      \n       [Fig. 4]"
  prior: 0.5
- type: claim
  name: upper_critical_fields_coherence_lengths_and_estimated_fermi_velocities_for_yh6_a
  content: "Magneto-transport measurements up to 9 T yield temperature-dependent upper critical fields H$_{c2}$(T) that were\
    \ fit by Ginzburg–Landau (GL) and Werthamer–Helfand–Hohenberg (WHH) models to estimate H$_{c2}$(0 K) and superconducting\
    \ coherence lengths. For P6$_{3}$/mmc YD$_{9}$ at P$_{H}\\approx205\\,$GPa the fits give $H_{c2}^{\\mathrm{WHH}}(0)=60\\\
    ,$T (GL fit $H_{c2}^{\\mathrm{GL}}(0)=46\\,$T) and a coherence length $\\xi(0)\\approx 2.3\\text{--}2.7\\,$nm using $\\\
    xi=\\sqrt{\\frac{\\phi_{0}}{3\\pi^{2}H_{c2}}}$ with $\\phi_{0}$ the magnetic flux quantum. For Im-3m YH$_{6}$ (sample\
    \ conditions reported) the fits yield $H_{c2}^{\\mathrm{WHH}}(0)=157\\,$T ($H_{c2}^{\\mathrm{GL}}(0)=107\\,$T) and $\\\
    xi(0)\\approx 1.45\\text{--}1.75\\,$nm. For hcp-YH$_{9}$ an estimate $H_{c2}^{\\mathrm{WHH}}(0)\\approx120\\,$T was obtained\
    \ by scaling arguments assuming comparable Fermi velocities in deuteride and hydride counterparts. Using the BCS relation\
    \ $\\xi = 0.18\\,\\frac{h v_{F}}{k_{\\mathrm{B}} T_{c}}$ and measured $\\xi$ and T$_{c}$ values yields estimated Fermi\
    \ velocities $v_{F}\\approx 2.85\\times10^{5}\\,$m/s for one phase and $\\approx2.3\\times10^{5}\\,$m/s for the other,\
    \ indicating similar carrier dispersion scales among these superhydrides.\n      \n       [Fig. 5; Fig. 4]"
  prior: 0.5
- type: claim
  name: failure_to_synthesize_fccyh10_under_explored_conditions_yh9_is_the_hydrogen_rich
  content: "Extensive synthesis trials, including laser heating of YH$_{3}$ with NH$_{3}$BH$_{3}$ up to temperatures of 1600–2250\
    \ K and pressures up to 410 GPa, did not produce the theoretically predicted fcc-YH$_{10}$ phase. Instead, the hydrogen-richest\
    \ yttrium hydride observed under the experimental pressure–temperature range was hcp-YH$_{9}$ (P6$_{3}$/mmc), which remained\
    \ the dominant hydrogen-rich phase even at 410 GPa and 2250(10) K. No diffraction evidence or transient signatures attributable\
    \ to fcc-YH$_{10}$ were detected during in situ heating or in quenched products within the explored conditions.\n    \
    \  \n       [Fig. 3]"
  prior: 0.5
- type: claim
  name: measured_tc_values_for_yh6_and_yh9_are_systematically_lower_than_many_prior_theo
  content: The experimentally measured maximum T$_{c}$ values for bcc-YH$_{6}$ (maximum measured ~224 K in these experiments)
    and hcp-YH$_{9}$ (maximum measured 243 K) are approximately 20–30 K lower than several prior theoretical predictions that
    reported T$_{c}$ ranges of 251–264 K for YH$_{6}$ and 253–276 K for YH$_{9}$. Further theoretical work that includes effects
    beyond the approximations used in some prior calculations (e.g., strong anharmonicity, precise electron–phonon coupling
    calculations, finite-temperature free-energy differences) is required because existing anharmonic-corrected calculations
    for YH$_{6}$ still predict T$_{c}$ values higher than those experimentally observed.
  prior: 0.5
- type: claim
  name: experimental_stability_ranges_and_decomposition_pressures_for_synthesized_yh_pha
  content: "The high-hydrogen-content phases have the following experimentally observed stability/decomposition behaviour\
    \ on decompression: hcp-YH$_{9}$ decomposes into bcc-YH$_{6}$ upon pressure reduction at $\\sim159\\,$GPa in the reported\
    \ sample; bcc-YH$_{6}$ decomposes at $\\sim135\\,$GPa in a deuterated sample; bct-YH$_{4}$ remains stable down to at least\
    \ $\\sim135\\,$GPa. These experimental decomposition pressures are higher than some theoretical equilibrium formation\
    \ pressures predicted in prior works (for example, theoretical equilibrium formation pressure for YH$_{9}$ was predicted\
    \ near 100 GPa by some calculations), indicating significant hysteresis and possible kinetic/thermodynamic differences\
    \ between experiment and different theoretical predictions.\n      \n       [Fig. 2; Fig. 4]"
  prior: 0.5
- type: claim
  name: absence_of_superconductivity_in_fcc_yh3_and_bct_yh4_within_measured_t_ranges_con
  content: "Electrical resistance measurements found no superconducting transition in fcc-YH$_{3}$ down to 5 K for pressures\
    \ in the 15–180 GPa range, and no superconductivity was observed in bct-YH$_{4}$ down to 78 K at 250 GPa. These negative\
    \ results contrast with some theoretical predictions that had assigned superconducting T$_{c}$ values of ~40 K for YH$_{3}$\
    \ and 84–95 K for YH$_{4}$.\n      \n       [Supplementary Fig. 4; Fig. 2]"
  prior: 0.5
- type: claim
  name: measured_tcp_profiles_have_dome_like_shapes_with_maxima_and_subsequent_decreases
  content: "For both Im-3m YH$_{6}$ and P6$_{3}$/mmc YH$_{9}$ the dependence of T$_{c}$ on pressure exhibits a dome-like form:\
    \ T$_{c}$ rises with pressure to a maximum (YH$_{6}$ maximum ~224 K near 166 GPa; YH$_{9}$ maximum 243 K at 201 GPa) and\
    \ then decreases with further increasing pressure. The decrease in T$_{c}$ at higher pressures is consistent with pressure-induced\
    \ phonon stiffening or other electronic-structure changes; sharp drops in T$_{c}$ below certain pressures correspond to\
    \ structural distortions and phase transformations to lower-symmetry phases.\n      \n       [Fig. 4]"
  prior: 0.5
- type: chain_expr
  name: chain_synthesis_and_crystal_structure_identification_of_yttrium_hydrides_yh3_yh4_yh6_a
  edge_type: deduction
  steps:
  - step: 1
    lambda: "Describe sample synthesis methods used to produce yttrium hydrides: pieces of either metallic yttrium or preformed\
      \ yttrium trihydride (abbreviated YH$_{3}$; deuterated analogues denoted YD$_{3}$) were loaded into diamond anvil cells\
      \ (abbreviated DAC), pressurized in an excess molecular hydrogen (H$_{2}$) or deuterium (D$_{2}$) medium, and when required\
      \ were pulsed-laser heated; typical laser heating temperatures reached up to 1600–2250 K and maximum experimental pressures\
      \ reached 410 GPa, with sample handling in inert atmosphere to avoid oxidation and electrical contacts arranged in a\
      \ four-probe van der Pauw geometry for transport measurements (this synthesis protocol produced a set of 31 samples\
      \ whose conditions are tabulated). \n [[Methods]]"
    prior: 0.7
  - step: 2
    lambda: "State how crystal structures were determined: X-ray powder diffraction (abbreviated XRD) patterns were collected\
      \ at a high-energy synchrotron beamline with wavelengths $ \\lambda=0.2952\\ \\text{\\AA} $ and $0.3344\\ \\text{\\\
      AA}$, integrated with Dioptas software, indexed and refined using GSAS/EXPGUI, and quantitative structure refinements\
      \ (Rietveld and Le Bail) were performed to obtain refined lattice parameters, atomic positions and phase weight fractions\
      \ for each sample.\n [[57,58]]\n [Fig. 1]"
    prior: 0.7
  - step: 3
    ref: rietveld_le_bail_spacegroup_assignment
  - step: 4
    lambda: "Report the space-group assignments and how they arise from diffraction refinements: diffraction peak positions\
      \ and intensities for the observed phases were well fit by Rietveld/Le Bail refinements using the following crystallographic\
      \ assignments — face-centered cubic $Fm\\bar{3}m$ for the low-hydrogen phase (fcc-YH$_{3}$), body-centered tetragonal\
      \ $I4/mmm$ (notated in the paper as 14/mmm) for YH$_{4}$ (bct-YH$_{4}$), body-centered cubic $Im\\bar{3}m$ (notated\
      \ 1m-3m) for YH$_{6}$ (bcc-YH$_{6}$), and hexagonal $P6_{3}/mmc$ for YH$_{9}$ (hcp-YH$_{9}$); these assignments are\
      \ justified because the calculated peak positions for these space groups align with the experimental peak positions\
      \ and the refinements returned sensible weight fractions, lattice parameters and Y atomic coordinates consistent with\
      \ the refined fits.\n [Fig. 1]"
    prior: 0.7
    refs:
    - setting.rietveld_le_bail_spacegroup_assignment
  - step: 5
    ref: vinet_eos_fit_validity
  - step: 6
    ref: pressure_estimation_methods
  - step: 7
    lambda: "State the pressure range over which lattice parameters and volumes were measured and the method used to parametrize\
      \ their pressure dependence: lattice parameters for the identified phases were determined across pressures from approximately\
      \ 135 GPa up to 410 GPa, and the resulting unit-cell volumes $V$ as a function of pressure $P$ were fit to a Vinet equation\
      \ of state, which is an empirical pressure–volume relation used to parametrize compressional behavior; the fitted Vinet\
      \ curves provide continuous V($P$) descriptions for each phase and the fitted parameters are tabulated in the Supplementary\
      \ Information.\n [Fig. 2]"
    prior: 0.7
    refs:
    - setting.vinet_eos_fit_validity
    - setting.pressure_estimation_methods
  - step: 8
    lambda: "Record quantitative agreement with prior theoretical structure predictions: the experimentally measured lattice\
      \ volumes and the lattice-parameter ratio $c/a$ for the $P6_{3}/mmc$ and $I4/mmm$ phases agree with prior ab initio\
      \ predictions for the corresponding compositions (the authors explicitly cite theoretical works in the literature that\
      \ predicted these structures and their volumes), supporting the compositional assignments for the hydrogen-richer phases.\n\
      \ [[22-24,26,31,32]]\n [Fig. 2]"
    prior: 0.7
  - step: 9
    ref: hydrogen_induced_volume_composition_estimate
  - step: 10
    lambda: "Explain the independent composition estimates based on hydrogen-induced volume expansion: define the hydrogen-induced\
      \ volume expansion per H (or D) atom as $V_{H}$ (units Å$^{3}$/H(D) atom); using the extrapolated equation of state\
      \ for pure yttrium and the experimentally measured lattice volumes, the authors computed $V_{H}$ for the hydrogen-richer\
      \ phases and inferred approximate hydrogen contents, obtaining composition estimates of $YH_{5.7(3)}$ for the bcc-like\
      \ phase and $YH_{8.5(5)}$ for the hcp-like phase, where the parentheses denote the uncertainty in the last digit.\n\
      \ [[33]]\n [Fig. 2]"
    prior: 0.7
    refs:
    - setting.hydrogen_induced_volume_composition_estimate
  - step: 11
    ref: anomalous_volume_expansion_in_yh3
  - step: 12
    lambda: "Note the observed anomalous behavior of $V_{H}$ in YH$_{3}$ relative to other hydrides and its effect on composition\
      \ assignment: the authors report that $V_{H}$ in $YH_{3}$ is anomalously large compared with $V_{H}$ in higher yttrium\
      \ hydrides, and as a result the bct-YH$_{4}$ and fcc-YH$_{3}$ phases have similar lattice volumes in the 150–250 GPa\
      \ pressure range; this observation informed careful use of $V_{H}$ to estimate the hydrogen contents of the new bcc\
      \ and hcp phases rather than assuming a constant $V_{H}$ across stoichiometries.\n [Fig. 2]"
    prior: 0.7
    refs:
    - setting.anomalous_volume_expansion_in_yh3
  - step: 13
    lambda: "Conclude that the combined XRD refinements, Vinet fits and $V_{H}$ analysis constitute robust experimental identification:\
      \ because the Rietveld/Le Bail fits provide space-group assignments, refined lattice parameters and phase fractions,\
      \ the Vinet equation-of-state fits reproduce the measured V($P$) dependences, and the $V_{H}$-based composition estimates\
      \ are internally consistent with the structural assignments and with prior theoretical predictions, the authors identify\
      \ the synthesized phases as Fm-3m (fcc) YH$_{3}$, $I4/mmm$ (bct) YH$_{4}$, $Im\\bar{3}m$ (bcc) YH$_{6}$ and $P6_{3}/mmc$\
      \ (hcp) YH$_{9}$ and provide the stated composition estimates for the hydrogen-richer phases.\n [Fig. 1; Fig. 2]"
    prior: 0.7
  - step: 14
    ref: synthesis_and_crystal_structure_identification_of_yttrium_hydrides_yh3_yh4_yh6_a
