    prior: 0.7
  - step: 11
    ref: electrical_resistivity_behavior_sharp_drop_near_1325_k_and_zero_resistance_at_95
- type: chain_expr
  name: chain_structural_identification_of_hg_1223_hg_1212_and_a_long_period_superstructure_la
  edge_type: deduction
  steps:
  - step: 1
    lambda: 'Define the structural characterization methods used: X-ray diffraction by the Guinier technique (for bulk powder
      diffraction), energy-dispersive X-ray spectrometry (EDX/EDS) for local elemental analysis, selected-area electron-diffraction
      (SAED) for local reciprocal-lattice information, and high-resolution transmission electron microscopy (HRTEM) for real-space
      imaging of lattice planes and stacking sequences; these techniques were applied to the oxygen-annealed black material
      and to individual plate-like grains extracted from it.'
    prior: 0.7
  - step: 2
    lambda: Report the EDX/EDS compositional observation that about $15\%$ of the total sample volume consisted of plate-like
      grains containing Hg, Ba, Ca and Cu; state that some of these plate-like grains were selected for detailed SAED and
      HRTEM analysis.
    prior: 0.7
  - step: 3
    ref: saed_hrtem_phase_identification
  - step: 4
    lambda: "State the SAED/HRTEM structural observation that the plate-like Hg–Ba–Ca–Cu-containing grains \"consist mostly\
      \ of pure $HgBa_{2}Ca_{2}Cu_{3}O_{8+x}$ (Hg-1223), disordered mixtures of Hg-1223 and $HgBa_{2}CaCu_{2}O_{6+x}$ (Hg-1212),\
      \ and a periodic stacking sequence of the latter unit cells\"; record that this is the authors' identification based\
      \ on the electron-diffraction patterns and high-resolution imaging.\n [Fig. 1]"
    prior: 0.7
    refs:
    - setting.saed_hrtem_phase_identification
  - step: 5
    ref: guinier_limitation_small_volume_fraction
  - step: 6
    lambda: Explain that accurate bulk lattice-constant determination by X-ray Guinier diffraction was not possible because
      the volume fraction of the phases of interest is small; consequently, the authors deduced lattice-parameter values from
      SAED patterns instead.
    prior: 0.7
    refs:
    - setting.guinier_limitation_small_volume_fraction
  - step: 7
    ref: saed_lattice_constants_deduction
  - step: 8
    lambda: 'State the numerical lattice-constant deductions from SAED: for the tetragonal Hg-1212 unit $c=12.7(2)\ \mathring{\mathrm{A}}$
      (where $\mathring{\mathrm{A}}$ denotes an angstrom), for the tetragonal Hg-1223 unit $c=16.1(3)\ \mathring{\mathrm{A}}$,
      and for both unit types $a=3.93(7)\ \mathring{\mathrm{A}}$; record that the parenthetical uncertainties are those reported
      by the authors.'
    prior: 0.7
    refs:
    - setting.saed_lattice_constants_deduction
  - step: 9
    ref: superstructure_extent_qualifies_as_phase
  - step: 10
    lambda: "Describe the HRTEM image-based observation that a representative grain in $[100]$ orientation shows a stacking\
      \ sequence (given by the authors as example) 1223/1223/1212/1212/1223/1213, which produces a supercell with $c\\approx86.4\\\
      \ \\mathring{\\mathrm{A}}$ and that this stacking extends beyond $2{,}000\\ \\mathring{\\mathrm{A}}$, thereby qualifying\
      \ the superstructure as a distinct phase rather than a finite-size faulted region.\n [Fig. 1]"
    prior: 0.7
    refs:
    - setting.superstructure_extent_qualifies_as_phase
  - step: 11
    lambda: "Record the negative structural observation that both HRTEM images and SAED patterns gave no evidence for the\
      \ presence of Hg-1201-type grains or for HgO double layers in the examined grains; treat this absence as an explicit\
      \ experimental observation reported by the authors.\n [Fig. 1]"
    prior: 0.7
  - step: 12
    lambda: "Summarize the authors' structural conclusion: the plate-like grains analyzed by SAED and HRTEM are identified\
      \ predominantly as Hg-1223, as disordered Hg-1223/Hg-1212 mixtures, and as an ordered long-period superstructure of\
      \ these unit cells, and numerical lattice constants $c=12.7(2)\\ \\mathring{\\mathrm{A}}$ (Hg-1212), $c=16.1(3)\\ \\\
      mathring{\\mathrm{A}}$ (Hg-1223), and $a=3.93(7)\\ \\mathring{\\mathrm{A}}$ (both) are deduced from the electron-diffraction\
      \ data.\n [Fig. 1]"
    prior: 0.7
  - step: 13
    ref: structural_identification_of_hg_1223_hg_1212_and_a_long_period_superstructure_la
- type: chain_expr
  name: chain_sample_phase_composition_determined_by_edx_and_phase_fractions
  edge_type: deduction
  steps:
  - step: 1
    lambda: Define energy-dispersive X-ray spectrometry (EDX or EDS) as the local compositional analysis technique applied
      to the bulk annealed black material and to individual grains; also define "bulk characterization" to include X-ray Guinier
      diffraction as used by the authors.
    prior: 0.7
  - step: 2
    ref: edx_volume_fraction_estimates
  - step: 3
    ref: edx_sampling_representativeness
  - step: 4
    lambda: 'State the quantitative EDX/bulk-composition findings reported by the authors for the annealed black material:
      approximately $30\%$ by volume of $BaCuO_{2}$ grains, approximately $30\%$ by volume of $CuO$ grains, roughly $15\%$
      by volume of an unidentified oxide containing Hg, Ca and Cu, less than $5\%$ by volume of an oxide containing Ca and
      Cu, about $5\%$ of unspecified impurities, and about $15\%$ of the total volume consisting of plate-like Hg–Ba–Ca–Cu-containing
      grains (the grains that HRTEM/SAED associate with Hg-1223/Hg-1212).'
    prior: 0.7
    refs:
    - setting.edx_volume_fraction_estimates
    - setting.edx_sampling_representativeness
  - step: 5
    lambda: Record that the authors used these EDX-derived volume-fraction estimates to emphasize that the sample is a multiphase
      composite and that only a minority fraction (about $15\%$) of the sample volume consists of the plate-like Hg-containing
      grains of interest for associating structure with superconductivity.
    prior: 0.7
  - step: 6
    lambda: Note that the authors explicitly connect the EDX compositional inventory to subsequent interpretation of magnetic
      and transport data by stating that the relatively small volume fraction of Hg-containing plate-like grains limits the
      ability to perform precise bulk crystallographic measurements and complicates definitive phase-resolved attribution
      of superconducting signals.
    prior: 0.7
  - step: 7
    ref: sample_phase_composition_determined_by_edx_and_phase_fractions
- type: chain_expr
  name: chain_suggested_assignment_of_the_sim133_k_superconducting_phase_to_hg_1223_hypothesis
  edge_type: deduction
  steps:
  - step: 1
    lambda: Treat as established the upstream result "Magnetic detection of superconductivity with onset near $133.5\,$K and
      multi-phase magnetic signature" (conclusion id="1"), which provides that an oxygen-annealed HBCCO specimen displays
      superconducting diamagnetism with onset $T_{c}\approx133.5\,$K, a large relative superconducting volume fraction near
      $125\,$K (FC susceptibility reaching $\sim60\%$ of low-$T$ value), and multiple superconducting features in ZFC at $126\,$K
      and $112\,$K.
    prior: 0.7
  - step: 2
    lambda: "Treat as established the upstream result \"Structural identification of Hg-1223, Hg-1212 and a long-period superstructure;\
      \ lattice constants deduced\" (conclusion id=\"3\"), which provides that plate-like grains comprising $\\sim15\\%$ of\
      \ the sample volume consist mostly of Hg-1223, disordered Hg-1223/Hg-1212 mixtures, and an ordered superstructure, and\
      \ that Hg-1223 is the dominant phase seen microscopically in those grains.\n [Fig. 1]"
    prior: 0.7
  - step: 3
    ref: assignment_of_superconductivity_to_hg_grains
  - step: 4
    lambda: "Combine these upstream observations: since (a) the magnetic data indicate a dominant superconducting phase whose\
      \ diamagnetic onset is $T_{c}\\approx133.5\\,$K and which dominates the magnetic signal near 125 K, and (b) the microscopic\
      \ structural study shows that Hg-1223 is dominant among the plate-like Hg-containing grains investigated, infer that\
      \ it is plausible to assign the $\\sim133\\,$K superconducting phase to Hg-1223.\n [Fig. 2]\n [Fig. 1]"
    prior: 0.7
    refs:
    - setting.assignment_of_superconductivity_to_hg_grains
  - step: 5
    ref: assignment_presented_as_hypothesis
  - step: 6
    lambda: 'Explicitly state the authors'' caution: this assignment is presented as a suggested, plausible interpretation
      rather than as a definitive identification, because the sample is multiphase (only $\sim15\%$ by volume are the Hg-containing
      plate-like grains), single-phase material was not available, and no phase-resolved transport or magnetic measurements
      tying a single crystallographic phase to the superconducting transition were performed; therefore there is no unambiguous
      proof linking the $\sim133\,$K superconductivity to Hg-1223.'
    prior: 0.7
    refs:
    - setting.assignment_presented_as_hypothesis
  - step: 7
    ref: analogy_with_thallium_bismuth_cuprates
  - step: 8
    lambda: "Record the authors' contextual analogy and heuristic support for the suggestion: by analogy with thallium- and\
      \ bismuth-based multi-CuO$_{2}$ layered cuprates (the authors cite prior work on these systems), where transition temperature\
      \ $T_{c}$ tends to increase with the number of CuO$_{2}$ layers per unit cell, it is consistent with expectations that\
      \ the three-layer Hg-1223 phase could exhibit a higher $T_{c}$ than single- or two-layer Hg-based phases; the authors\
      \ therefore present Hg-1223 as the most plausible candidate for the $\\sim133\\,$K phase while acknowledging the lack\
      \ of definitive proof.\n [[5]]"
    prior: 0.7
    refs:
    - setting.analogy_with_thallium_bismuth_cuprates
  - step: 9
    lambda: 'Reiterate the explicit scientific framing the authors provide: the suggested attribution of the $\sim133\,$K
      superconductivity to Hg-1223 is a hypothesis pending phase-pure synthesis and phase-resolved measurements, and the authors
      emphasize that definitive confirmation requires synthesis of single-phase Hg-1223 material and direct phase-resolved
      correlation of structure, composition and superconducting properties.'
    prior: 0.7
  - step: 10
    ref: suggested_assignment_of_the_sim133_k_superconducting_phase_to_hg_1223_hypothesis
