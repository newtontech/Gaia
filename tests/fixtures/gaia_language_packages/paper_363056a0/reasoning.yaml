- type: claim
  name: magnetic_detection_of_superconductivity_with_onset_near_1335_k_and_multi_phase_m
  content: "The oxygen-annealed HBCCO specimen exhibits superconducting diamagnetism with an onset temperature $T_{c}\\approx133.5\\\
    ,$K measured in both zero-field-cooled (ZFC) and field-cooled (FC) SQUID magnetometry in an external field $H=27\\,$Oe.\
    \ The ZFC susceptibility at $T=6\\,$K attains approximately $100\\%$ of the ideal superconducting screening value $1/4\\\
    pi$ (assuming an average mass density $\\rho\\approx6~\\mathrm{g\\,cm^{-3}}$), indicating full magnetic screening of the\
    \ sample at low temperature; the FC susceptibility reaches roughly $10\\%$ of the maximum possible value at low temperature\
    \ and attains $\\sim60\\%$ of its full low-temperature value by $T=125\\,$K. The ZFC curve also shows additional diamagnetic\
    \ features at $126\\,$K and $112\\,$K, indicating the presence of several distinct superconducting phases within the specimen.\n\
    \      \n       [Fig. 2]"
  prior: 0.5
- type: claim
  name: electrical_resistivity_behavior_sharp_drop_near_1325_k_and_zero_resistance_at_95
  content: "The four-probe resistivity $R(T)$ of an annealed HBCCO specimen shows a sharp drop in $R$ with a maximum in $dR/dT$\
    \ at $T\\approx132.5\\,$K and achieves exactly zero resistance within instrumental resolution at $T=95\\,$K. Comparison\
    \ with as-sintered samples shows that the final oxygen annealing increased the maximum observed $T_{c}$ from $\\sim117\\\
    ,$K (as-sintered) to the present onset near $132.5$–$133.5\\,$K (oxygen-annealed).\n      \n       [Fig. 3]"
  prior: 0.5
- type: claim
  name: structural_identification_of_hg_1223_hg_1212_and_a_long_period_superstructure_la
  content: "High-resolution transmission electron microscopy (HRTEM) and selected-area electron-diffraction (SAED) identify\
    \ plate-like grains composed predominantly of $HgBa_{2}Ca_{2}Cu_{3}O_{8+x}$ (Hg-1223), disordered mixtures of Hg-1223\
    \ and $HgBa_{2}CaCu_{2}O_{6+x}$ (Hg-1212), and an ordered periodic stacking (superstructure) of these unit cells. From\
    \ SAED patterns the tetragonal lattice constants are deduced as $c=12.7(2)\\,\\mathrm{\\AA}$ for Hg-1212, $c=16.1(3)\\\
    ,\\mathrm{\\AA}$ for Hg-1223, and $a=3.93(7)\\,\\mathrm{\\AA}$ for both unit types. HRTEM images show an example stacking\
    \ sequence 1223/1223/1212/1212/1223/1213 with a supercell $c\\approx86.4\\,\\mathrm{\\AA}$ extending beyond $2000\\,\\\
    mathrm{\\AA}$, establishing the superstructure as a distinct phase. No Hg-1201-type grains or HgO double layers were detected\
    \ in the examined grains.\n      \n       [Fig. 1]"
  prior: 0.5
- type: claim
  name: sample_phase_composition_determined_by_edx_and_phase_fractions
  content: 'Energy-dispersive X-ray (EDX) spectrometry and bulk characterization indicate the annealed black material is a
    multiphase composite with approximate volume fractions: $\sim30\%$ $BaCuO_{2}$, $\approx30\%$ $CuO$, $\sim15\%$ of an
    unidentified oxide containing Hg, Ca and Cu, $<5\%$ of an oxide with Ca and Cu, $\sim5\%$ impurities of unspecified composition,
    and $\sim15\%$ of the total volume consisting of plate-like Hg–Ba–Ca–Cu-containing grains (the grains that HRTEM/SAED
    associate with Hg-1223/Hg-1212).'
  prior: 0.5
- type: claim
  name: suggested_assignment_of_the_sim133_k_superconducting_phase_to_hg_1223_hypothesis
  content: "Based on the dominance of Hg-1223 observed in the grains investigated microscopically and the large relative superconducting\
    \ volume fraction inferred near $125\\,$K, it is suggested (without unambiguous proof) that $HgBa_{2}Ca_{2}Cu_{3}O_{8+x}$\
    \ (Hg-1223) is responsible for superconductivity with onset near $\\sim133\\,$K in these samples. This attribution is\
    \ explicitly presented as a plausible interpretation rather than as a definitive identification.\n      \n       [Fig.\
    \ 1; Fig. 2]"
  prior: 0.5
- type: chain_expr
  name: chain_magnetic_detection_of_superconductivity_with_onset_near_1335_k_and_multi_phase_m
  edge_type: deduction
  steps:
  - step: 1
    lambda: Define "oxygen-annealed specimen" as a sample that, after the main high-temperature synthesis steps, was subjected
      to a final heat treatment in flowing oxygen at $300^{\circ}\mathrm{C}$ for 5 hours; this is the sample on which the
      magnetic measurements discussed below were performed.
    prior: 0.7
  - step: 2
    lambda: Define "SQUID magnetometer" as the superconducting-quantum-interference-device magnetometer (Quantum Design) used
      to measure magnetic susceptibility $\chi(T)$ as a function of temperature $T$ in an externally applied magnetic field
      $H$; the applied field used here is $H=27\,$Oe, where $1\ \mathrm{Oe}$ denotes one oersted.
    prior: 0.7
  - step: 3
    lambda: Define "zero-field-cooled (ZFC) susceptibility" as the measured magnetic susceptibility obtained when the specimen
      is cooled to low temperature in zero applied field and then the external field $H$ is applied before measuring $\chi(T)$
      on warming; define "field-cooled (FC) susceptibility" as the susceptibility measured while cooling the specimen in the
      presence of the applied field $H$.
    prior: 0.7
  - step: 4
    ref: average_mass_density_assumption
  - step: 5
    lambda: "State the observation that in the ZFC measurement the low-temperature susceptibility $\\chi(T=6\\ \\mathrm{K})$\
      \ attains approximately $100\\%$ of the ideal superconducting screening value $1/4\\pi$ (where $1/4\\pi$ denotes the\
      \ ideal demagnetizing-free susceptibility of a perfectly diamagnetic superconductor in cgs units), under the assumption\
      \ of an average mass density $\\rho\\approx6\\ \\mathrm{g\\,cm^{-3}}$ for the specimen; this is reported as indicating\
      \ complete magnetic screening of the sample at $T=6\\ \\mathrm{K}$.\n [Fig. 2]"
    prior: 0.7
    refs:
    - setting.average_mass_density_assumption
  - step: 6
    lambda: Define the assumed mass density symbol $\rho$ as $\rho\approx6\ \mathrm{g\,cm^{-3}}$, the value the authors used
      to convert measured magnetization into an approximate superconducting-volume fraction; note that this assumption is
      explicitly invoked by the authors rather than derived.
    prior: 0.7
  - step: 7
    ref: field_cooled_underestimates_volume_fraction
  - step: 8
    lambda: "Report the observation that the FC susceptibility reaches roughly $10\\%$ of the maximum possible value at low\
      \ temperature (i.e., $\\sim10\\%$ of $1/4\\pi$) for the same measurement, and interpret this as a lower-bound estimate\
      \ of the true superconducting volume fraction in the sample because field-cooling measurements can underestimate the\
      \ screened fraction compared with ZFC measurements.\n [Fig. 2]"
    prior: 0.7
    refs:
    - setting.field_cooled_underestimates_volume_fraction
  - step: 9
    lambda: "Report the observation that the diamagnetic onset temperature (the temperature where $\\chi(T)$ first departs\
      \ from the normal-state value toward diamagnetism) is $T_{c}\\approx133.5\\,$K, seen in both ZFC and FC measurements;\
      \ record $T_{c}$ as the onset temperature of superconducting diamagnetism in this oxygen-annealed specimen.\n [Fig.\
      \ 2]"
    prior: 0.7
  - step: 10
    ref: fc_60_percent_indicates_dominant_phase
  - step: 11
    lambda: "State the additional FC-data observation that the FC susceptibility reaches approximately $60\\%$ of its full\
      \ low-temperature FC value by $T=125\\,$K, which the authors take as \"strongly indicating\" that the phase with $T_{c}\\\
      approx133.5\\,$K dominates the superconducting response near 125 K.\n [Fig. 2]"
    prior: 0.7
    refs:
    - setting.fc_60_percent_indicates_dominant_phase
  - step: 12
    ref: zfc_subsidiary_features_as_distinct_superconducting_phases
  - step: 13
    lambda: "Report the ZFC-curve observation of subsidiary diamagnetic features (additional decreases in $\\chi(T)$) at $T\\\
      approx126\\,$K and at $T\\approx112\\,$K; define these features as distinct steps or shoulders in the ZFC susceptibility\
      \ curve and record the authors' interpretation that these indicate the presence of several distinct superconducting\
      \ phases within the multiphase specimen.\n [Fig. 2]"
    prior: 0.7
    refs:
    - setting.zfc_subsidiary_features_as_distinct_superconducting_phases
  - step: 14
    lambda: "Explicitly record that the authors treat the magnetic evidence (the high onset $T_{c}\\approx133.5\\,$K, the\
      \ full ZFC screening at low temperature under the stated density assumption, the partial FC shielding fraction, and\
      \ the additional ZFC features) as demonstrating bulk superconducting diamagnetism in the oxygen-annealed HBCCO specimen,\
      \ while also acknowledging that multiphase behavior is present.\n [Fig. 2]"
    prior: 0.7
  - step: 15
    ref: magnetic_detection_of_superconductivity_with_onset_near_1335_k_and_multi_phase_m
- type: chain_expr
  name: chain_electrical_resistivity_behavior_sharp_drop_near_1325_k_and_zero_resistance_at_95
  edge_type: deduction
  steps:
  - step: 1
    lambda: "Define the four-probe resistivity measurement as the temperature-dependent electrical resistance $R(T)$ measured\
      \ with a standard four-probe a.c.-resistance bridge; the particular specimen discussed was an oxygen-annealed HBCCO\
      \ pellet whose resistance was normalized to $R(300)\\approx0.10\\ \\Omega$ for presentation.\n [Fig. 3]"
    prior: 0.7
  - step: 2
    lambda: "State the observation that $R(T)$ exhibits a sharp drop starting at high temperature, with the temperature derivative\
      \ $dR/dT$ showing a clear maximum at $T\\approx132.5\\,$K; the inset of the resistivity plot displays $dR/dT$ to make\
      \ this maximum explicit.\n [Fig. 3]"
    prior: 0.7
  - step: 3
    ref: dR_dT_max_as_transition_indicator
  - step: 4
    lambda: "Define the symbol $dR/dT$ as the temperature derivative of the resistance $R(T)$, and record that the maximum\
      \ in $dR/dT$ is used by the authors to indicate the temperature where the resistive transition is most rapid, here at\
      \ $T\\approx132.5\\,$K.\n [Fig. 3]"
    prior: 0.7
    refs:
    - setting.dR_dT_max_as_transition_indicator
  - step: 5
    ref: zero_resistance_interpreted_as_true_superconducting_state
  - step: 6
    ref: zero_resistance_resolution_note
  - step: 7
    lambda: "Report the experimental observation that $R(T)$ reaches exactly zero resistance (within the instrumental resolution\
      \ of the four-probe a.c.-resistance bridge used) at $T=95\\,$K; explicitly state that \"zero resistance\" here means\
      \ \"below the resolution limit of the bridge\" as the authors do.\n [Fig. 3]"
    prior: 0.7
    refs:
    - setting.zero_resistance_interpreted_as_true_superconducting_state
    - setting.zero_resistance_resolution_note
  - step: 8
    ref: oxygen_annealing_causes_Tc_increase
  - step: 9
    lambda: "State the comparative observation that as-sintered (that is, not oxygen-annealed) samples showed a maximum observed\
      \ $T_{c}$ of only $\\sim117\\,$K, and conclude (as the authors do) that the final oxygen annealing treatment was very\
      \ effective in increasing the maximum observed transition temperature up to the present onset near $132.5$–$133.5\\\
      ,$K.\n [Fig. 3]"
    prior: 0.7
    refs:
    - setting.oxygen_annealing_causes_Tc_increase
  - step: 10
    lambda: "Record the authors' combined transport conclusion: the resistivity data provide a high-temperature resistive\
      \ anomaly with onset near $132.5\\,$K (maximum $dR/dT$ there) and a zero-resistance state at $95\\,$K in the annealed\
