- type: claim
  name: discovery_of_superconductivity_with_record_transition_temperature_in_hg_ba_ca_cu
  content: The Hg-Ba-Ca-Cu-O system exhibits superconductivity with an onset transition temperature of $T_{c} \approx 133.5$
    K, which surpasses the previous record of $\sim 127$ K observed in the Tl-system. This result is established through magnetic
    susceptibility measurements (showing diamagnetism onset at 133.5 K and strong screening at 125 K) and electrical resistivity
    measurements (showing a sharp drop at $132.5$ K and zero resistance at $95$ K).
  prior: 0.5
- type: claim
  name: identification_of_hg_1212_and_hg_1223_phases_and_lattice_parameters
  content: 'The synthesized material contains two distinct high-temperature superconducting phases: $HgBa_{2}CaCu_{2}O_{6+x}$
    (Hg-1212, with two $CuO_{2}$ layers) and $HgBa_{2}Ca_{2}Cu_{3}O_{8+x}$ (Hg-1223, with three $CuO_{2}$ layers), as well
    as ordered superstructures (e.g., a supercell with $c \approx 86.4 \AA$). The tetragonal lattice parameters derived from
    selected-area electron diffraction (SAED) are $a=3.93(7)\AA$ for both phases, with $c=12.7(2)\AA$ for Hg-1212 and $c=16.1(3)\AA$
    for Hg-1223.'
  prior: 0.5
- type: claim
  name: attribution_of_highest_tc_to_the_three_layer_hg_1223_phase
  content: The superconducting transition at $\sim 133$ K is attributed to the $HgBa_{2}Ca_{2}Cu_{3}O_{8+x}$ (Hg-1223) phase.
    This conclusion is supported by the correlation between the high volume fraction of Hg-1223 observed in microscopic analysis
    and the large field-cooling susceptibility signal, and reinforces the empirical trend that $T_{c}$ increases with the
    number of $CuO_{2}$ planes per unit cell in layered copper oxide systems.
  prior: 0.5
- type: claim
  name: critical_role_of_oxygen_annealing
  content: Post-synthesis annealing in flowing oxygen at $300^{\circ}C$ is required to maximize the transition temperature
    in the Hg-Ba-Ca-Cu-O system; as-sintered samples exhibit a significantly lower maximum $T_{c}$ of $\sim 117$ K compared
    to the $\sim 133$ K achieved after annealing.
  prior: 0.5
- type: chain_expr
  name: chain_1
  edge_type: deduction
  steps:
  - step: 1
    ref: structural_analogy_with_tl_based_copper_oxides
  - step: 2
    lambda: Based on the structural similarity to Tl-1201 [@premise-2] and the trend of increasing $T_c$ with the number of
      $CuO_2$ layers observed in thallium and bismuth compounds [@premise-3], the authors conjecture that transition temperatures
      exceeding 100 K can be achieved in the Hg-Ba-Ca-Cu-O system by synthesizing members with more than one $CuO_2$ layer
      ($n > 1$).
    prior: 0.7
  - step: 3
    lambda: Samples are prepared using a precursor $Ba_{2}CaCu_{2}O_{5}$ mixed with $HgO$, heated at $800^{\circ}C$, and annealed
      in oxygen. The goal is to produce phases with $n=2$ (Hg-1212) and $n=3$ (Hg-1223).
    prior: 0.7
  - step: 4
    lambda: Using SAED and HRTEM, the authors confirm that the synthesized material contains grains of $HgBa_{2}Ca_{2}Cu_{3}O_{8+x}$
      (Hg-1223), $HgBa_{2}CaCuO_{6+x}$ (Hg-1212), and ordered superstructures. The lattice constants are determined as $c=12.7(2)\mathring{A}$
      for Hg-1212 and $c=16.1(3)\mathring{A}$ for Hg-1223, with $a=3.93(7)\mathring{A}$.
    prior: 0.7
  - step: 5
    lambda: 'Magnetic susceptibility $\chi(T)$ is measured using a SQUID magnetometer.

      The authors observe an onset of diamagnetism at $T_{c} \approx 133.5 \text{ K}$ in both Field Cooling (FC) and Zero-Field
      Cooling (ZFC) experiments.'
    prior: 0.7
  - step: 6
    lambda: Using the assumed density [@assumption-6], the ZFC susceptibility at 6 K corresponds to $\sim 100\%$ screening
      ($1/4\pi$). The FC susceptibility reaches $\sim 10\%$ of the maximum possible value. The authors interpret this FC value
      as a lower bound for the superconducting volume fraction, indicating bulk superconductivity.
    prior: 0.7
  - step: 7
    lambda: Electrical resistivity $R(T)$ is measured. The authors observe a sharp drop in resistivity at $T \approx 132.5
      \text{ K}$ (maximum in $dR/dT$) and zero resistance at $T = 95 \text{ K}$.
    prior: 0.7
  - step: 8
    ref: previous_record_transition_temperature
  - step: 9
    lambda: The observed onset temperature of $\sim 133.5 \text{ K}$ is compared to the previous record of 125–127 K found
      in the Tl-system [@premise-4], establishing the new result as distinctly higher.
    prior: 0.7
  - step: 10
    ref: tc_scaling_in_tl_based_systems
  - step: 11
    lambda: 'The FC susceptibility reaches $\sim 60\%$ of its full low-temperature value at 125 K. The authors argue this
      indicates the phase with $T_{c} \approx 133.5 \text{ K}$ dominates the superconducting volume.

      Based on the microscopic observation that Hg-1223 is the dominant phase in the grains investigated, and the analogy
      that $T_c$ increases with layer number [@premise-3], the authors conclude that Hg-1223 is responsible for the superconductivity
      at $\sim 133$ K.'
    prior: 0.7
  - step: 12
    ref: discovery_of_superconductivity_with_record_transition_temperature_in_hg_ba_ca_cu
