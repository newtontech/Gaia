  name: chain_2
  edge_type: deduction
  steps:
  - step: 1
    lambda: Based on the structural similarity to thallium-based copper oxides, the authors hypothesize the existence of the
      Hg-based homologous series $HgBa_{2}Ca_{n-1}Cu_{n}O_{2n+2+\delta}$, specifically expecting phases corresponding to $n=2$
