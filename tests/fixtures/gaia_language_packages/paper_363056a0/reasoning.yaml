    prior: 0.7
  - step: 6
    ref: microscopic_structural_identification
  - step: 7
    lambda: The authors investigated these specific grains using SAED and HRTEM, confirming the presence of distinct Hg-1223
      and Hg-1212 phases, as well as disordered mixtures and periodic stackings [@premise-4].
    prior: 0.7
  - step: 8
    ref: xrd_limitation
  - step: 9
    lambda: Due to the insufficient volume fraction for precise X-ray diffraction analysis [@premise-5], the authors utilized
      SAED patterns to deduce the lattice constants.
    prior: 0.7
  - step: 10
    lambda: From the SAED patterns, the authors calculated the tetragonal lattice parameters to be $a=3.93(7)\AA$ for both
      phases, $c=12.7(2)\AA$ for the Hg-1212 units, and $c=16.1(3)\AA$ for the Hg-1223 units.
    prior: 0.7
  - step: 11
    ref: superstructure_observation
  - step: 12
    lambda: The authors further confirmed the existence of ordered superstructures through HRTEM imaging, which displayed
      a periodic stacking of Hg-1212 and Hg-1223 units with a supercell c-axis of $c \approx 86.4 \AA$ [@premise-6].
    prior: 0.7
  - step: 13
    ref: identification_of_hg_1212_and_hg_1223_phases_and_lattice_parameters
- type: chain_expr
  name: chain_3
  edge_type: deduction
  steps:
  - step: 1
    lambda: Measurements of magnetic susceptibility and resistivity in the synthesized Hg-Ba-Ca-Cu-O samples reveal a superconducting
      transition with an onset temperature $T_{c} \approx 133.5$ K.
    prior: 0.7
  - step: 2
    lambda: The field-cooling (FC) susceptibility at 125 K reaches $\sim 60\%$ of its full low-temperature value, indicating
      that the phase responsible for the $T_{c} \approx 133.5$ K transition is volumetrically dominant among the superconducting
      phases present.
    prior: 0.7
  - step: 3
    lambda: Structural characterization using SAED and HRTEM identifies grains consisting of $HgBa_{2}CaCu_{2}O_{6+x}$ (Hg-1212,
      $n=2$) and $HgBa_{2}Ca_{2}Cu_{3}O_{8+x}$ (Hg-1223, $n=3$), as well as ordered superstructures, within the sample.
    prior: 0.7
  - step: 4
    lambda: Microscopic analysis determines that the identified grains containing Hg, Ba, Ca, and Cu consist mostly of the
      Hg-1223 phase.
    prior: 0.7
  - step: 5
    ref: empirical_trend_in_tl_and_bi_copper_oxides
  - step: 6
    lambda: Based on the trend observed in thallium and bismuth systems [@premise-2], and given that the $n=1$ phase (Hg-1201)
      has a $T_{c}$ of 94 K [@premise-1], the authors infer that the transition temperatures in the Hg-system should increase
      with the number of $CuO_{2}$ layers ($n$).
    prior: 0.7
  - step: 7
    lambda: The authors correlate the dominance of the Hg-1223 phase observed in microscopy with the dominance of the high-$T_{c}$
      signal ($\sim 133$ K) in susceptibility measurements. Combining this with the expectation that the $n=3$ phase (Hg-1223)
      should have a higher $T_{c}$ than the $n=1$ phase (94 K) or $n=2$ phase, they attribute the $\sim 133$ K transition
      to Hg-1223.
    prior: 0.7
  - step: 8
    ref: attribution_of_highest_tc_to_the_three_layer_hg_1223_phase
- type: chain_expr
  name: chain_4
  edge_type: deduction
  steps:
  - step: 1
    lambda: The authors prepared samples by mixing a precursor material $Ba_{2}CaCu_{2}O_{5}$ (obtained from nitrates sintered
      at $900^{\circ}C$ in $O_{2}$) with powdered $HgO$. The mixture was pressed into pellets, sealed in evacuated quartz
      tubes, and heated at $800^{\circ}C$ for 5 hours.
    prior: 0.7
  - step: 2
    lambda: The authors noted that upon opening the steel containers, the quartz tubes were found to be broken, implying an
      uncontrolled atmosphere during the cooling or late heating stage.
    prior: 0.7
  - step: 3
    lambda: The authors characterized the samples in their "as-sintered" state (before any post-synthesis annealing) and observed
      a maximum superconducting transition temperature ($T_{c}$) of only $\sim 117$ K.
    prior: 0.7
  - step: 4
    lambda: 'A subset of the synthesized pellets was subjected to a specific post-synthesis annealing process: heating for
      5 hours at $300^{\circ}C$ in flowing oxygen.'
    prior: 0.7
  - step: 5
    lambda: Resistivity measurements on the oxygen-annealed samples showed a sharp drop in resistivity starting at a maximum
      temperature of $T \approx 132.5$ K, reaching zero resistance at 95 K.
    prior: 0.7
  - step: 6
    lambda: Magnetic susceptibility measurements (Zero-Field Cooling and Field Cooling) on the oxygen-annealed samples revealed
      an onset of diamagnetism at $T_{c} \approx 133.5$ K.
    prior: 0.7
  - step: 7
    lambda: Using the assumed density [@assumption-4], the authors calculated that the zero-field cooling susceptibility corresponded
      to $\sim 100\%$ screening, and field-cooling susceptibility reached $\sim 10\%$ (and $\sim 60\%$ of its low-T value
      at 125 K), confirming that the phase with $T_{c} \approx 133.5$ K is a dominant bulk phase.
    prior: 0.7
  - step: 8
    lambda: 'The authors compared the transition temperatures obtained from the two processing conditions: $\sim 133$ K for
      the oxygen-annealed samples versus $\sim 117$ K for the as-sintered samples.'
    prior: 0.7
  - step: 9
    lambda: Based on the significant increase in $T_{c}$ from $\sim 117$ K to $\sim 133$ K, the authors deduced that the final
      oxygen treatment at $300^{\circ}C$ was effective and necessary to achieve the higher transition temperature.
    prior: 0.7
  - step: 10
    ref: critical_role_of_oxygen_annealing
