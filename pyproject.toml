[project]
name = "gaia"
version = "0.1.0"
description = "Large Knowledge Model — billion-scale reasoning hypergraph"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "lancedb>=0.6",
    "neo4j>=5.0",
    "fastapi>=0.110",
    "uvicorn>=0.29",
    "numpy>=1.26",
    "pyarrow>=15.0",
    "litellm>=1.40",
    "httpx>=0.27",
    "lxml>=5.0",
    "kuzu>=0.4",
    "pandas>=2.0",
    "pyyaml>=6.0",
    "typer[all]>=0.12",
    "scikit-learn>=1.8.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "httpx>=0.27",
    "ruff>=0.3",
    "python-dotenv>=1.0",
]

[build-system]
requires = ["setuptools>=69.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["libs*", "services*", "cli*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "neo4j: tests requiring a running Neo4j instance",
    "integration_api: tests requiring real LLM/embedding API credentials",
]

[project.scripts]
gaia = "cli.main:app"

[tool.coverage.run]
omit = [
    "scripts/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "# requires: api",
    "# requires: neo4j",
    "# requires: lancedb",
]

[tool.ruff]
line-length = 100
target-version = "py312"
